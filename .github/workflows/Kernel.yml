name: "S25U-SukiSU-Ultra-6.6-Global-Pack"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 inotify-tools patch
          chmod +x kernel_platform/build/kernel/build.config.sh || true
          touch hijack.log && chmod 666 hijack.log

      - name: 🧬 注入 SukiSU-Ultra & 手动补入 SUSFS (6.6 路径适配版)
        run: |
          cd kernel_platform/common
          
          # 1. 注入 SukiSU-Ultra 核心
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          
          # 2. 拉取 SUSFS 源码 (指定 6.6 分支或最新版)
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          
          # 3. 【核心修复】自动定位并拷贝，防止路径写死报错
          echo "🔍 正在自动搜索 SUSFS 核心组件..."
          find /tmp/susfs -name "susfs.c" -exec cp {} drivers/kernelsu/ \;
          find /tmp/susfs -name "susfs.h" -exec cp {} include/linux/ \;
          
          # 检查文件是否到位
          if [ -f "drivers/kernelsu/susfs.c" ] && [ -f "include/linux/susfs.h" ]; then
              echo "✅ SUSFS 组件已就绪"
          else
              echo "❌ 依然找不到 SUSFS 文件，尝试备用路径..."
              # 某些版本可能在 fs 目录下
              find /tmp/susfs -name "susfs.c" | head -n 1 | xargs -I {} cp {} drivers/kernelsu/
              find /tmp/susfs -name "susfs.h" | head -n 1 | xargs -I {} cp {} include/linux/
          fi
          
          # 4. 注册 SUSFS 并优化符号表
          sed -i '/susfs.o/d' drivers/kernelsu/Makefile
          echo "obj-y += susfs.o" >> drivers/kernelsu/Makefile
          echo "KBUILD_CFLAGS += -fno-optimize-sibling-calls" >> Makefile
          echo "✅ 源码层注入彻底完成"

      - name: 🛰️ 启动后台劫持引擎
        run: |
          sudo stdbuf -oL -eL ./kernel_platform/build/kernel/build.config.sh > hijack.log 2>&1 &
          echo "HIJACK_PID=$!" >> $GITHUB_ENV

      - name: 🏗️ 执行内核编译
        run: |
          (
            LAST_CONTENT=""
            while true; do
              CURRENT_CONTENT=$(cat hijack.log 2>/dev/null)
              if [ "$CURRENT_CONTENT" != "$LAST_CONTENT" ]; then
                echo -e "\n--- [实时战报] ---"
                diff <(echo "$LAST_CONTENT") <(echo "$CURRENT_CONTENT") | grep '^>' | sed 's/^> //' || echo "$CURRENT_CONTENT"
                LAST_CONTENT="$CURRENT_CONTENT"
              fi
              sleep 5
            done
          ) &
          MONITOR_PID=$!

          export LOCALVERSION=""
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun
          
          kill $MONITOR_PID || true

      - name: 🛠️ 全局搜寻产物并连根拔起打包
        if: success()
        run: |
          mkdir -p dtbo_work
          echo "🔍 正在从 out/ 和 drivers/ 提取唯一 DTBO..."
          find out drivers -name "*.dtbo" -type f 2>/dev/null | while read -r dtbo_file; do
              file_hash=$(md5sum "$dtbo_file" | awk '{print $1}')
              if [ ! -f "dtbo_work/${file_hash}.hash" ]; then
                  touch "dtbo_work/${file_hash}.hash"
                  cp "$dtbo_file" "dtbo_work/${file_hash}.dtbo"
              fi
          done
          ./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg create dtbo.img dtbo_work/*.dtbo || true
          
          echo "🔍 全局搜寻 Image..."
          GLOBAL_IMAGE=$(find . -name "Image" -type f | grep "sun_perf" | head -n 1)
          [ -z "$GLOBAL_IMAGE" ] && GLOBAL_IMAGE=$(find . -name "Image" -type f | grep -v "AnyKernel" | head -n 1)
          
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 ak3_pack
          [ -n "$GLOBAL_IMAGE" ] && cp "$GLOBAL_IMAGE" ak3_pack/
          [ -f "dtbo.img" ] && cp dtbo.img ak3_pack/
          cd ak3_pack && zip -r9 ../S25U-SukiSU-Kernel-Flashable.zip ./*
          cd ..

          echo "📦 全量归档 out/ 和 drivers/ ..."
          [ -d "out" ] && zip -r9 out_full_archive.zip out/
          [ -d "drivers" ] && zip -r9 drivers_full_archive.zip drivers/

      - name: 📂 整理产物
        if: always()
        run: |
          mkdir -p final_artifacts
          cp S25U-SukiSU-Kernel-Flashable.zip final_artifacts/ 2>/dev/null || true
          cp out_full_archive.zip final_artifacts/ 2>/dev/null || true
          cp drivers_full_archive.zip final_artifacts/ 2>/dev/null || true
          cp hijack.log final_artifacts/ 2>/dev/null || true

      - name: 📤 上传全量结果
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-SukiSU-Ultra-Global-Pack
          path: final_artifacts/

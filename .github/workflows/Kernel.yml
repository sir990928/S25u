name: S25_Ultra_内核编译_全量成丹版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 设置超时时间为 6 小时，防止大型编译中途被切断
    timeout-minutes: 360
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix aria2

      # 1. 下载源码包 (使用 aria2 提速)
      - name: 下载源码安装包
        run: |
          aria2c -x 16 -s 16 -k 1M -o kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      # 2. 合并解压 (保持原汁原味，确保脚本能找到 .git 环境)
      - name: 根目录自动合并解压
        run: |
          echo "📦 正在解压工具链..."
          unzip -o -q kernel_platform.zip -d .
          sudo rm -f kernel_platform.zip

      # 3. 注入 SukiSU
      - name: 在线注入 SukiSU
        run: |
          echo "💉 正在注入 SukiSU 模块..."
          cd kernel_platform/common
          curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin

      # 4. 修改 Defconfig 配置 (开启 KPM/SU 并精简调试日志)
      - name: 修改 Defconfig 配置
        run: |
          echo "⚙️ 正在优化内核配置..."
          ./kernel_platform/common/scripts/config --file ./kernel_platform/common/arch/arm64/configs/gki_defconfig \
          --set-str LOCALVERSION "-S25" -e KPM \
          -d UH -d RKP -d KDP -d SECURITY_DEFEX -d INTEGRITY -d FIVE -d KNOX_NCM \
          -d LOCALVERSION_AUTO -d DEFAULT_SECURITY_DAC -d DEFAULT_SELINUX \
          -d TRIM_UNUSED_KSYMS -d DEBUG_INFO -d DEBUG_INFO_BTF -d DEBUG_INFO_REDUCED \
          -d DEBUG_FS -d GCOV -d KASAN -d UBSAN -d KPROBES

      # 5. 暴力赋权
      - name: 暴力赋权
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      # 6. 执行内核编译
      - name: 执行内核编译
        run: |
          cd $GITHUB_WORKSPACE
          # 运行编译脚本
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # 7. 提取全量产物 (Image + DTBO + KO) 并打包
      - name: 提取产物并打包
        run: |
          cd $GITHUB_WORKSPACE
          # 克隆卡刷模板
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          
          echo "🔍 正在寻找编译产物..."
          # 寻找内核本体
          IMAGE_PATH=$(find . -name "Image" -not -path "./AK3/*" -type f | head -n 1)
          # 寻找 DTBO
          DTBO_PATH=$(find . -name "dtbo.img" -not -path "./AK3/*" -type f | head -n 1)
          
          if [ -n "$IMAGE_PATH" ]; then
            echo "✅ 发现 Image: $IMAGE_PATH"
            cp -f "$IMAGE_PATH" AK3/
            
            if [ -n "$DTBO_PATH" ]; then
              echo "✅ 发现 DTBO: $DTBO_PATH"
              cp -f "$DTBO_PATH" AK3/dtbo.img
            fi

            # 收集所有 .ko 驱动模块
            echo "📦 正在收集 .ko 驱动模块..."
            mkdir -p AK3/modules
            find . -name "*.ko" -not -path "./AK3/*" -exec cp {} AK3/modules/ \;
            
            # 统计模块数量
            KO_COUNT=$(ls AK3/modules | wc -l)
            echo "📊 共收集到 $KO_COUNT 个驱动模块"
            
            # 压缩打包，文件名带上时间戳
            cd AK3 && zip -r "../S25_Kernel_SukiSU_$(date +%m%d%H%M).zip" . -x ".git/*"
          else
            echo "❌ 全域未找到 Image，编译可能失败，请检查上方日志"
            exit 1
          fi

      # 8. 上传最终卡刷包
      - name: 上传内核卡刷包
        uses: actions/upload-artifact@v4
        with:
          name: S25_SukiSU_Kernel
          path: S25_Kernel_SukiSU_*.zip

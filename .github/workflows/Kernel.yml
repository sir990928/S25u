name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Fix line endings
        run: find . -name "*.sh" | xargs dos2unix 2>/dev/null || true

      - name: Setup SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      - name: Build with custom config overrides
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export POST_DEFCONFIG_CMDS="apply_custom"

          apply_custom() {
            scripts/config --file .config \
              -e KPM \
              -d KNOX_NCM \
              -d UH \
              -d RKP \
              -d KDP \
              -d SECURITY_DEFEX \
              -d INTEGRITY \
              -d FIVE \
              -d TRIM_UNUSED_KSYMS
            echo 'CONFIG_LOCALVERSION="-S25-SukiSU-KPM"' >> .config
            make olddefconfig
          }

          bash build_kernel_GKI.sh pa3q_chn_openx user sun --nocheck_defconfig || true

      - name: Collect output
        if: always()
        run: |
          mkdir -p output
          find kernel_platform/bazel-out -name ".config" -exec cp {} output/ \;
          find kernel_platform/out -name "Image*" -exec cp {} output/ \;

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25_Build
          path: output/


name: "S25U-SukiSU-Final-Triple-Upload"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 patch
          chmod +x ./build_kernel_GKI.sh
          chmod +x ./kernel_platform/build/kernel/build.config.sh || true

      - name: 🧬 注入 SukiSU & SUSFS
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          git clone --depth=1 -b gki-android15-6.6-dev https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          cp /tmp/susfs/kernel_patches/fs/susfs.c ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h ./include/linux/
          grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile
          rm -f android/abi_gki_protected_exports_*

      - name: 🏗️ 后台劫持与前台编译
        run: |
          # 启动后台引擎 (静默模式，防止日志重影)
          nohup sudo ./kernel_platform/build/kernel/build.config.sh > /dev/null 2>&1 &
          HIJACK_PID=$!
          
          # 执行编译
          export LOCALVERSION=""
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun
          
          kill $HIJACK_PID || true

      - name: 🛠️ 产物提取与合成 (Image + DTBO)
        if: always()
        run: |
          mkdir -p final_artifacts
          
          # 1. 你的 DTBO 合并逻辑 (扫 out 和 drivers)
          mkdir -p dtbo_work
          declare -A seen_hashes
          find out drivers -name "*.dtbo" -type f 2>/dev/null | while read -r dtbo_file; do
              hash=$(md5sum "$dtbo_file" | awk '{print $1}')
              if [ -z "${seen_hashes[$hash]}" ]; then
                  seen_hashes[$hash]=1
                  cp "$dtbo_file" "dtbo_work/${hash}.dtbo"
              fi
          done
          
          # 合成
          if [ -d "dtbo_work" ] && [ "$(ls -A dtbo_work)" ]; then
              ./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg create dtbo.img dtbo_work/*.dtbo || true
          fi

          # 2. 准备卡刷包
          GLOBAL_IMAGE=$(find out -name "Image" | grep "sun_perf" | head -n 1)
          if [ -n "$GLOBAL_IMAGE" ]; then
              git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 ak3_pack
              cp "$GLOBAL_IMAGE" ak3_pack/
              [ -f "dtbo.img" ] && cp dtbo.img ak3_pack/
              cd ak3_pack && zip -r9 ../final_artifacts/S25U-Flashable.zip ./* && cd ..
          fi

      - name: 📤 上传卡刷包 (Flashable Zip)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Flashable-Kernel
          path: final_artifacts/S25U-Flashable.zip

      - name: 📤 连根拔起：上传全量 out 目录
        if: always()
        run: zip -r1 out_full_root.zip out/
      
      - name: 🚀 上传 out_full_root.zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Root-Out-Folder
          path: out_full_root.zip

      - name: 📤 连根拔起：上传全量 drivers 目录
        if: always()
        run: zip -r1 drivers_full_root.zip drivers/

      - name: 🚀 上传 drivers_full_root.zip
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Root-Drivers-Folder
          path: drivers_full_root.zip


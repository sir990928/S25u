name: "S25U-SukiSU-Ultra-Final-Full-Triple"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 inotify-tools patch
          chmod +x ./build_kernel_GKI.sh
          chmod +x ./kernel_platform/build/kernel/build.config.sh || true

      - name: 🧬 注入 SukiSU-Ultra 并物理搬运 SUSFS 核心文件
        run: |
          cd kernel_platform/common
          
          # 1. 注入 SukiSU-Ultra
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          
          # 2. 获取 SUSFS 源码
          git clone --depth=1 -b gki-android15-6.6-dev https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          
          # 3. 物理搬运核心文件 (西蒙朋克要求的基础文件)
          cp /tmp/susfs/kernel_patches/fs/susfs.c ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h ./include/linux/
          
          # 4. 【补丁注入 A】针对 SukiSU 的物理路径 (drivers/kernelsu) 应用补丁
          # 尝试进入目录打补丁，如果失败则回滚到 common 尝试
          cd drivers/kernelsu
          patch -p1 < /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || patch -p2 < /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "⚠️ KSU 补丁冲突"
          cd ../..

          # 5. 【补丁注入 B】最重要的内核核心手术 (50_add)
          # 使用 fuzz=3 和 ignore-whitespace 强制匹配 6.6 内核源码，确保 open.c 等被成功劫持
          patch -p1 --fuzz=3 --ignore-whitespace < /tmp/susfs/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || echo "❌ 50_add 补丁失败"

          # 6. 【二重保险】即便补丁有小冲突，也要确保头文件引用成功
          if [ -f "drivers/kernelsu/ksu.c" ]; then
              sed -i '1i #include <linux/susfs.h>' drivers/kernelsu/ksu.c
          fi
          
          # 7. 修复 6.6 内核 current_uid 报错
          sed -i '1i #include <linux/cred.h>\n#include <linux/uidgid.h>' include/linux/susfs_def.h
          
          # 8. 屏蔽 Werror
          find . -name "Makefile" -type f -exec sed -i 's/-Werror/-Wno-error/g' {} +

          # 9. 注册编译目标
          if ! grep -q "susfs.o" fs/Makefile; then
              echo "obj-y += susfs.o" >> fs/Makefile
          fi

          # 10. 移除 ABI 保护
          rm -f android/abi_gki_protected_exports_*
          echo "✅ 注入流程已完成"

      - name: 🏗️ 后台劫持与前台编译
        run: |
          # 启动后台引擎 (静默运行)
          nohup sudo ./kernel_platform/build/kernel/build.config.sh > /dev/null 2>&1 &
          HIJACK_PID=$!
          
          # 执行编译
          export LOCALVERSION=""
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun
          
          kill $HIJACK_PID || true

      - name: 🛠️ 产物提取与 DTBO 合成
        if: always()
        run: |
          mkdir -p final_artifacts
          
          # DTBO 合并逻辑
          mkdir -p dtbo_work
          declare -A seen_hashes
          find out drivers -name "*.dtbo" -type f 2>/dev/null | while read -r dtbo_file; do
              hash=$(md5sum "$dtbo_file" | awk '{print $1}')
              if [ -z "${seen_hashes[$hash]}" ]; then
                  seen_hashes[$hash]=1
                  cp "$dtbo_file" "dtbo_work/${hash}.dtbo"
              fi
          done
          
          if [ -d "dtbo_work" ] && [ "$(ls -A dtbo_work)" ]; then
              ./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg create dtbo.img dtbo_work/*.dtbo || true
          fi

          # 准备卡刷包
          GLOBAL_IMAGE=$(find out -name "Image" | grep "sun_perf" | head -n 1)
          if [ -n "$GLOBAL_IMAGE" ]; then
              git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 ak3_pack
              cp "$GLOBAL_IMAGE" ak3_pack/
              [ -f "dtbo.img" ] && cp dtbo.img ak3_pack/
              cd ak3_pack && zip -r9 ../final_artifacts/S25U-Flashable-Kernel.zip ./* && cd ..
          fi

      - name: 📤 上传 1：卡刷包
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Flashable-Kernel
          path: final_artifacts/S25U-Flashable-Kernel.zip

      - name: 📤 上传 2：根目录 out 全量
        if: always()
        run: |
          if [ -d "out" ]; then
              zip -r1 out_full_root.zip out/
          fi
      
      - name: 🚀 上传 out
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Root-Out
          path: out_full_root.zip

      - name: 📤 上传 3：根目录 drivers 全量
        if: always()
        run: |
          if [ -d "drivers" ]; then
              zip -r1 drivers_full_root.zip drivers/
          fi

      - name: 🚀 上传 drivers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Root-Drivers
          path: drivers_full_root.zip


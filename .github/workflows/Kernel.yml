name: "S25U-SukiSU-Ultra-6.6-Final"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 inotify-tools patch
          # 给予脚本执行权限
          chmod +x ./build_kernel_GKI.sh
          chmod +x ./kernel_platform/build/kernel/build.config.sh || true
          # 预创建日志文件
          touch hijack.log && chmod 666 hijack.log

      - name: 🧬 注入 SukiSU-Ultra & SUSFS 源码 (精准适配)
        run: |
          cd kernel_platform/common
          
          # 1. 注入 SukiSU 核心
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          
          # 2. 克隆 SUSFS gki-android15-6.6-dev 分支
          git clone --depth=1 -b gki-android15-6.6-dev https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          
          # 3. 搬运核心物理文件
          cp /tmp/susfs/kernel_patches/fs/susfs.c ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h ./include/linux/
          
          # 4. 应用补丁 (如果补丁已手动合入可忽略报错)
          cd drivers/kernelsu && patch -p1 < /tmp/susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || echo "KSU Patch Skip"
          cd ../../ && patch -p1 < /tmp/susfs/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch || echo "Core Patch Skip"
          
          # 5. 注册编译目标
          grep -q "susfs.o" fs/Makefile || echo "obj-y += susfs.o" >> fs/Makefile
          
          # 6. 移除 ABI 保护
          rm -f android/abi_gki_protected_exports_*
          echo "✅ 注入流程已全部对齐"

      - name: 🛰️ 启动后台劫持引擎
        run: |
          # 使用 nohup 确保后台进程不会随当前 shell 退出而消失
          # 使用 stdbuf 强制输出刷新到 hijack.log
          nohup sudo stdbuf -oL -eL ./kernel_platform/build/kernel/build.config.sh > hijack.log 2>&1 &
          
          # 验证进程是否存活
          sleep 3
          if pgrep -f "build.config.sh" > /dev/null; then
            echo "✅ 劫持引擎已在后台启动 (PID: $(pgrep -f "build.config.sh"))"
          else
            echo "❌ 劫持引擎启动失败！查看启动错误："
            cat hijack.log
            exit 1
          fi

      - name: 🏗️ 执行内核编译 (实时监控劫持动态)
        run: |
          # 启动后台监控：实时打印日志文件内容变动
          tail -f hijack.log &
          MONITOR_PID=$!
          
          export LOCALVERSION=""
          # 执行编译
          # yes "" 防止脚本在编译过程中有交互式停顿
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun
          
          # 编译结束后杀死监控和后台劫持
          kill $MONITOR_PID || true
          sudo pkill -f "build.config.sh" || true

      - name: 🛠️ 提取并打包产物
        if: success()
        run: |
          mkdir -p dtbo_work
          find out drivers -name "*.dtbo" -type f | while read -r file; do
              cp "$file" "dtbo_work/$(basename "$file")" 2>/dev/null || true
          done
          [ -f "kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg" ] && ./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg create dtbo.img dtbo_work/*.dtbo || true
          
          GLOBAL_IMAGE=$(find out -name "Image" | grep "sun_perf" | head -n 1)
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 ak3_pack
          [ -n "$GLOBAL_IMAGE" ] && cp "$GLOBAL_IMAGE" ak3_pack/
          [ -f "dtbo.img" ] && cp dtbo.img ak3_pack/
          cd ak3_pack && zip -r9 ../S25U-SukiSU-Kernel.zip ./*

      - name: 📤 上传最终结果
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Final-Image
          path: |
            S25U-SukiSU-Kernel.zip
            hijack.log


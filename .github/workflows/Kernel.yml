Name: S25 GKI SukiSU + Knox Patch + Config Export
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Setup SukiSU (Builtin)
        run: |
          # Ensure target directory exists before curling
          cd kernel_platform/common || exit 1
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      - name: Inject Custom Configs
        run: |
          # Path for sun_perf.config in Kleaf/Samsung structure
          FILE="kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_perf.config"
          
          if [ -f "$FILE" ]; then
            cat >> "$FILE" << 'EOF'

# Custom Kernel Identity
CONFIG_LOCALVERSION="-S25-SukiSU-KPM"

# KPM & SukiSU
CONFIG_KPM=y

# Knox/Security Disable
CONFIG_KNOX_NCM=n
CONFIG_UH=n
CONFIG_RKP=n
CONFIG_KDP=n
CONFIG_SECURITY_SELINUX=n
CONFIG_SECURITY_SELINUX_PERMISSIVE=y
CONFIG_DM_VERITY=n
CONFIG_AVB=n
EOF
            echo "✅ Configs injected into $FILE"
          else
            echo "⚠️ Warning: $FILE not found, check pathing."
          fi

      - name: Compile Kernel (Kleaf/Bazel)
        run: |
          # Using the official build script usually found in Samsung's source
          # pa3q_chn_openx is the project code; sun is the platform
          ./kernel_platform/build/build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: Extract Final .config
        run: |
          # Bazel outputs are usually in a deep symlinked tree
          # We look specifically for the .config used during the final link
          find kernel_platform/out -name ".config" -type f -exec cp {} ./final_kernel.config \; || true
          
          if [ -f "./final_kernel.config" ]; then
             echo "✅ Extracted final .config"
          else
             echo "❌ Failed to find .config in out directory"
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          
          # Move images and modules
          find kernel_platform/out -name "Image" -exec cp {} AK3/ \;
          find kernel_platform/out -name "dtbo.img" -exec cp {} AK3/ \;
          
          mkdir -p AK3/modules
          find kernel_platform/out -name "*.ko" -exec cp {} AK3/modules/ \;
          
          # Include the extracted config for debugging
          [ -f "./final_kernel.config" ] && cp ./final_kernel.config AK3/

          cd AK3
          zip -r "../S25_GKI_SukiSU_KPM.zip" . -x ".git/*"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: S25-Kernel-SukiSU
          path: S25_GKI_SukiSU_KPM.zip
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          cd $GITHUB_WORKSPACE

      # 编译 + 动态修改 .config
      - name: 编译内核 + 动态修改 .config
        run: |
          (
            while true; do
              CONFIG_PATH=$(find kernel_platform/bazel-out/k8-fastbuild/bin/common -name ".config" 2>/dev/null | head -n 1)
              if [ -n "$CONFIG_PATH" ] && [ -f "$CONFIG_PATH" ]; then
                echo "✅ 捕获到 .config: $CONFIG_PATH"
                sed -i 's/CONFIG_KNOX=y/CONFIG_KNOX=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_SECURITY_SELINUX=y/CONFIG_SECURITY_SELINUX=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_DM_VERITY=y/CONFIG_DM_VERITY=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_AVB=y/CONFIG_AVB=n/g' "$CONFIG_PATH"
                echo "CONFIG_KPM=y" >> "$CONFIG_PATH"
                echo "CONFIG_LOCALVERSION=\"-S25-SukiSU-KPM\"" >> "$CONFIG_PATH"
                break
              fi
              sleep 0.2
            done
          ) &

          # 清理旧 bazel 缓存，避免空间占用
          cd kernel_platform
          tools/bazel clean --expunge || true
          cd ..

          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3

          find . -name "Image" -type f | grep -v AK3 | head -n 1 | xargs -I{} cp {} AK3/
          find . -name "dtbo.img" -type f | grep -v AK3 | head -n 1 | xargs -I{} cp {} AK3/

          mkdir -p AK3/modules
          find . -name "*.ko" -type f | grep -v AK3 | xargs -r cp -t AK3/modules/

          cd AK3
          zip -r "../S25_GKI_SukiSU.zip" . -x ".git/*"

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_GKI_SukiSU
          path: S25_GKI_SukiSU.zip
              if [ -n "$CONFIG_PATH" ] && [ -f "$CONFIG_PATH" ]; then
                
                echo "✅ 捕获到 .config: $CONFIG_PATH"
                
                # 禁用安全
                sed -i 's/CONFIG_KNOX=y/CONFIG_KNOX=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_SECURITY_SELINUX=y/CONFIG_SECURITY_SELINUX=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_DM_VERITY=y/CONFIG_DM_VERITY=n/g' "$CONFIG_PATH"
                sed -i 's/CONFIG_AVB=y/CONFIG_AVB=n/g' "$CONFIG_PATH"
                
                # 开启 KPM
                echo "CONFIG_KPM=y" >> "$CONFIG_PATH"
                
                # 自定义内核名称
                echo "CONFIG_LOCALVERSION=\"-S25-SukiSU-KPM\"" >> "$CONFIG_PATH"
                
                break
              fi
              sleep 0.2
            done
          ) &
          
          # 直接运行你的正常编译，不等待、不prepare
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3

          find . -name "Image" -type f | grep -v AK3 | head -n 1 | xargs -I{} cp {} AK3/
          find . -name "dtbo.img" -type f | grep -v AK3 | head -n 1 | xargs -I{} cp {} AK3/

          mkdir -p AK3/modules
          find . -name "*.ko" -type f | grep -v AK3 | xargs -r cp -t AK3/modules/

          cd AK3
          zip -r "../S25_GKI_SukiSU.zip" . -x ".git/*"

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_GKI_SukiSU
          path: S25_GKI_SukiSU.zip

llname: 三星S25u_内核编译_SukiSU版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 环境依赖初始化
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio

      - name: 注入 KernelSU 源码
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 替换为自定义配置
        run: |
          cd kernel_platform
          cp S25.config .config
          echo "✅ 已启用自定义内核配置"

      - name: 开始编译
        run: |
          cd kernel_platform
          export CL_SYNC="SukiSU"
          export BUILD_NUMBER="Ultra"
          export SEC_BUILD_OPTION_KNOX_CSB="n"
          export SEC_PRODUCT_SHIP="n"
          export SKIP_DEFCONFIG_VALIDATION=1
          chmod +x build_kernel_GKI.sh
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包并上传
        run: |
          mkdir -p output AnyKernel3
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          IMAGE=$(find . -name "Image" -type f | head -1)
          if [ -n "$IMAGE" ]; then
            cp "$IMAGE" AnyKernel3/
            zip -r9 output/S25u-Custom-Kernel.zip AnyKernel3/*
          fi
        uses: actions/upload-artifact@v4
        with:
          name: S25u-Custom-Kernel
          path: output/


name: 三星S25u_内核编译_自定义更名版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            out/
            kernel_platform/bazel-out
          key: ${{ runner.os }}-bazel-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: 环境依赖初始化
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      # ==================== 关键：自动禁用冲突配置 ====================
      - name: 自动屏蔽冲突的 config fragment 叠加
        run: |
          FILE1="kernel_platform/msm-kernel/build.config.msm.perf"
          FILE2="kernel_platform/msm-kernel/build.config.allyesconfig"
          FILE3="kernel_platform/msm-kernel/build.config.gki"

          for f in $FILE1 $FILE2 $FILE3; do
            if [ -f "$f" ]; then
              sed -i 's|^apply_defconfig_fragment|#apply_defconfig_fragment|' "$f"
              echo "已注释：$f"
            fi
          done

      - name: 格式规范化
        run: find . -name "*.sh" -exec dos2unix {} + || true

      - name: 注入 KernelSU 源码
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 开始 Bazel 构建
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export SKIP_CONFIG_CHECK=1
          export SKIP_ABI_CHECK=1
          export GKI_KMI_ENFORCED=0
          export ALLOW_CONFIG_OVERRIDE=1
          export ALLOW_OVERRIDE_CONFIG=1

          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3 刷机包
        run: |
          mkdir -p output
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          
          IMAGE=$(find . -name "Image" -type f 2>/dev/null | head -1)
          
          if [ -n "$IMAGE" ]; then
            cp -v "$IMAGE" AnyKernel3/
            find . -name "dtbo.img" -type f 2>/dev/null -exec cp {} AnyKernel3/ \;
            mkdir -p AnyKernel3/modules/lib/modules/
            find . -name "*.ko" -type f 2>/dev/null -exec cp {} AnyKernel3/modules/lib/modules/ \;
            
            cd AnyKernel3
            zip -r9 ../S25u-Custom-Kernel.zip ./*
            cd ..
            mv S25u-Custom-Kernel.zip output/
          else
            echo "错误：未找到 Image 文件，编译失败"
            exit 1
          fi

      - name: 上传构建产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25u-Feng-Kernel
          path: output/


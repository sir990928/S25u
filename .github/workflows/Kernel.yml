          [ -f "./final_kernel.config" ] && cp ./final_kernel.config AK3/
          cd AK3
          zip -r "../S25_内核打包产物.zip" . -x ".git/*"

      - name: 上传结果
        uses: actions/upload-artifact@v4
        with:
          name: S25_Kernel_Artifact
          path: S25_内核打包产物.zip

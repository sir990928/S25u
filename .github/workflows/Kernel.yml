name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Fix line endings
        run: find . -name "*.sh" -exec dos2unix {} + || true

      - name: Setup SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      - name: Build kernel
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export POST_DEFCONFIG_CMDS="update_config"

          update_config() {
              scripts/config --file .config \
                  -e UNWINDER_FRAME_POINTER \
                  -d WERROR \
                  -d SAMPLES \
                  -d BPFILTER \
                  -e RANDSTRUCT_NONE \
                  -d RANDSTRUCT_FULL \
                  -d RANDSTRUCT \
                  -d AF_RXRPC \
                  -d AFS_FS \
                  -e KPM \
                  -d KNOX_NCM \
                  -d UH \
                  -d RKP \
                  -d KDP \
                  -d SECURITY_DEFEX \
                  -d INTEGRITY \
                  -d FIVE \
                  -d TRIM_UNUSED_KSYMS
              echo 'CONFIG_LOCALVERSION="-S25-SukiSU-KPM"' >> .config
              make olddefconfig
          }

          bash build_kernel_GKI.sh pa3q_chn_openx user sun --nocheck_defconfig || true

      - name: Collect output
        if: always()
        run: |
          mkdir -p output
          find kernel_platform/bazel-out/k8-fastbuild -name .config -exec cp {} output/ \;
          find kernel_platform/out -name "Image*" -exec cp {} output/ \;

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25_Build
          path: output/


name: 三星S25u_内核编译

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖流程
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 修复行尾符
        run: find . -name "*.sh" -exec dos2unix {} + || true

      - name: 配置 SukiSU GKI
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 绕过构建校验与配置注入
        run: |
          # 1. 定位核心文件
          MSM_COMMON=$(find . -name "build.config.msm.common" | head -1)
          GKI_DEFCONFIG=$(find . -name "gki_defconfig" | head -1)
          SUN_PERF=$(find . -name "sun_perf.config" | head -1)
          # 寻找控制内核配置读取的关键 Makefile
          KCONFIG_MAKEFILE=$(find . -path "*/scripts/kconfig/Makefile" | head -1)
          
          echo "找到配置文件: $MSM_COMMON, $GKI_DEFCONFIG, $SUN_PERF"
          echo "关键 Makefile: $KCONFIG_MAKEFILE"

          # 2. 【核心修复】拦截并重定向 Makefile 的配置读取逻辑
          # 既然沙盒死活不让造新文件，我们就把 Makefile 里的引用路径改掉
          if [ -f "$KCONFIG_MAKEFILE" ]; then
            echo "正在对 Makefile 执行路径重定向..."
            # 替换 Makefile 中对缺失文件的所有可能引用
            sed -i 's/vendor\/sun-gki_defconfig/vendor\/sun_perf.config/g' "$KCONFIG_MAKEFILE"
            sed -i 's/sun-gki_defconfig/sun_perf.config/g' "$KCONFIG_MAKEFILE"
          fi

          # 3. 函数打桩：强行跳过三星的校验函数
          if [ -f "$MSM_COMMON" ]; then
            sed -i '/function merge_defconfig_fragments() {/a \  return 0' "$MSM_COMMON"
            sed -i '/function check_merged_defconfig() {/a \  return 0' "$MSM_COMMON"
            echo "已完成函数打桩."
          fi

          # 4. 注入自定义内核参数 (KSU + 安全选项关闭)
          # 此时只需修改 sun_perf.config，因为 Makefile 已经被我们改成了读取它
          for target in "$GKI_DEFCONFIG" "$SUN_PERF"; do
            if [ -f "$target" ]; then
              echo "正在注入配置到: $target"
              # 屏蔽冲突项
              for key in CONFIG_KSU CONFIG_KPROBES CONFIG_KPROBE_EVENTS CONFIG_OVERLAY_FS CONFIG_KNOX_NCM CONFIG_UH CONFIG_RKP CONFIG_KDP CONFIG_SECURITY_DEFEX CONFIG_FIVE CONFIG_SEC_RESTRICT_SETUID CONFIG_SEC_RESTRICT_FORK CONFIG_SEC_RESTRICT_ROOT_ACCESS CONFIG_LOCALVERSION; do
                sed -i "s/^$key=/# $key=/g" "$target" || true
              done
              # 写入新参数
              printf "\nCONFIG_KSU=y\nCONFIG_KPROBES=y\nCONFIG_KPROBE_EVENTS=y\nCONFIG_OVERLAY_FS=y\nCONFIG_KNOX_NCM=n\nCONFIG_UH=n\nCONFIG_RKP=n\nCONFIG_KDP=n\nCONFIG_SECURITY_DEFEX=n\nCONFIG_FIVE=n\nCONFIG_SEC_RESTRICT_SETUID=n\nCONFIG_SEC_RESTRICT_FORK=n\nCONFIG_SEC_RESTRICT_ROOT_ACCESS=n\nCONFIG_LOCALVERSION=\"-S25-GKI-SukiSU\"\n" >> "$target"
            fi
          done

      - name: 执行内核编译
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export SKIP_CONFIG_CHECK=1
          export SKIP_ABI_CHECK=1
          export GKI_KMI_ENFORCED=0
          
          # 执行三星 S25u 专属构建指令
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 使用 AnyKernel3 打包
        run: |
          mkdir -p output
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          
          # 智能搜寻 Image 产物
          IMAGE=$(find kernel_platform/bazel-out -name "Image" -type f | head -1)
          [ -z "$IMAGE" ] && IMAGE=$(find kernel_platform/bazel-out -name "Image.gz" -type f | head -1)
          
          if [ -n "$IMAGE" ]; then
            cp "$IMAGE" AnyKernel3/
            find kernel_platform/bazel-out -name "dtbo.img" -type f -exec cp {} AnyKernel3/ \;
            mkdir -p AnyKernel3/modules/lib/modules/
            find kernel_platform/bazel-out -name "*.ko" -type f -exec cp {} AnyKernel3/modules/lib/modules/ \;
            
            cd AnyKernel3 && zip -r9 ../S25-GKI-SukiSU.zip ./* && cd ..
            mv S25-GKI-SukiSU.zip output/
          else
            echo "错误: 未找到 Image，编译流程可能存在异常。" && exit 1
          fi

      - name: 上传编译产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25u-内核-SukiSU
          path: output/


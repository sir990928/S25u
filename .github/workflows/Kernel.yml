name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Fix line endings
        run: find . -name "*.sh" -exec dos2unix {} + || true

      - name: Clean old KSU/SUSFS
        run: |
          cd kernel_platform/common
          rm -rf drivers/kernelsu
          rm -f include/linux/susfs.h

      - name: Setup SukiSU GKI
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: Clone AnyKernel3
        run: |
          if [ ! -d AnyKernel3 ]; then
            git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          fi

      - name: Build kernel
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export SKIP_CONFIG_CHECK=1

          bash build_kernel_GKI.sh pa3q_chn_openx user sun --prepare_only || true

          BAZEL_CONFIG=$(find kernel_platform/bazel-out -name .config | grep common | head -1)

          if [ -n "$BAZEL_CONFIG" ]; then
            sed -i '
              s/CONFIG_WERROR=y/CONFIG_WERROR=n/g
              s/CONFIG_SAMPLES=y/CONFIG_SAMPLES=n/g
              s/CONFIG_BPFILTER=y/CONFIG_BPFILTER=n/g
              s/CONFIG_RANDSTRUCT_FULL=y/CONFIG_RANDSTRUCT_FULL=n/g
              s/CONFIG_RANDSTRUCT=y/CONFIG_RANDSTRUCT=n/g
              s/CONFIG_AF_RXRPC=y/CONFIG_AF_RXRPC=n/g
              s/CONFIG_AFS_FS=y/CONFIG_AFS_FS=n/g
              s/CONFIG_KNOX_NCM=y/CONFIG_KNOX_NCM=n/g
              s/CONFIG_UH=y/CONFIG_UH=n/g
              s/CONFIG_RKP=y/CONFIG_RKP=n/g
              s/CONFIG_KDP=y/CONFIG_KDP=n/g
              s/CONFIG_SECURITY_DEFEX=y/CONFIG_SECURITY_DEFEX=n/g
              s/CONFIG_INTEGRITY=y/CONFIG_INTEGRITY=n/g
              s/CONFIG_FIVE=y/CONFIG_FIVE=n/g
              s/CONFIG_TRIM_UNUSED_KSYMS=y/CONFIG_TRIM_UNUSED_KSYMS=n/g
              s/CONFIG_UNWINDER_FRAME_POINTER=n/CONFIG_UNWINDER_FRAME_POINTER=y/g
              s/CONFIG_RANDSTRUCT_NONE=n/CONFIG_RANDSTRUCT_NONE=y/g
              s/CONFIG_KPM=n/CONFIG_KPM=y/g
            ' "$BAZEL_CONFIG"

            echo 'CONFIG_LOCALVERSION="-S25-GKI-SukiSU"' >> "$BAZEL_CONFIG"
            export SKIP_CONFIG_REGEN=1
          fi

          bash build_kernel_GKI.sh pa3q_chn_openx user sun --nocheck_defconfig || true

      - name: Pack with AnyKernel3
        run: |
          mkdir -p output
          
          # 复制内核、dtbo
          find . -name "Image" -o -name "Image.gz" | head -1 | xargs cp -t AnyKernel3/
          find . -name "dtbo.img" | head -1 | xargs cp -t AnyKernel3/

          # 模块按正规路径：modules/lib/modules
          mkdir -p AnyKernel3/modules/lib/modules/
          find . -name "*.ko" -type f | xargs cp -t AnyKernel3/modules/lib/modules/

          # 打包
          cd AnyKernel3
          zip -r9 ../S25-GKI-SukiSU.zip ./*
          cd ..
          
          mv S25-GKI-SukiSU.zip output/
          find kernel_platform/bazel-out/k8-fastbuild/bin/common/ -name ".config" -exec cp {} output/ \; 2>/dev/null

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25_GKI_SukiSU
          path: output/


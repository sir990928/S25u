      - name: 下载内核源码&干净解压
        run: |
          rm -rf kernel_platform kernel_platform.zip
          wget -O kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip
          # 使用 -j 可能破坏目录结构，建议先解压再移动
          unzip -q -o kernel_platform.zip
          # 💡 核心逻辑：如果解压出来发现多了一层目录，把它移出来
          if [ ! -d "kernel_platform" ] && [ -d "kernel_platform_main" ]; then mv kernel_platform_main kernel_platform; fi
          # 看看现在里面到底有啥，脑壳不痛
          ls -R | grep build_with_bazel.py

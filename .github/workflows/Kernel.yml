name: 三星S25u_内核编译_SukiSU版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 环境依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 注入 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 编译 + 批量替换.config（替换过自动跳过）
        run: |
          chmod +x build_kernel_GKI.sh

          ./build_kernel_GKI.sh pa3q_chn_openx user sun &
          BUILD_PID=$!

          echo "编译已启动 PID: $BUILD_PID"
          sleep 3

          MY_CONFIG="kernel_platform/S25.config"

          while true; do
            # 找出所有沙盒里的 msm-kernel.config
            find kernel_platform/bazel-cache \
              -path "*/sandbox/linux-sandbox/*/out/android15-6.6/msm-kernel/.config" \
              -type f 2>/dev/null | while read cfg; do

              # 替换过就跳过
              if grep -q "REPLACED" "$cfg"; then
                continue
              fi

              echo "替换配置: $cfg"
              cp -f "$MY_CONFIG" "$cfg"
              echo "# REPLACED" >> "$cfg"

            done

            # 编译退出就结束
            if ! kill -0 $BUILD_PID 2>/dev/null; then
              echo "编译完成"
              break
            fi

            sleep 1
          done

          wait $BUILD_PID

      - name: 打包内核
        run: |
          mkdir -p output
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3

          mkdir -p dtbo_collection ko_collection

          find . -name "*.dtbo" -type f -not -path "./AnyKernel3/*" -exec cp {} dtbo_collection/ \;
          MKDTBOIMG="kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg"

          if [ -x "$MKDTBOIMG" ]; then
            $MKDTBOIMG create AnyKernel3/dtbo.img dtbo_collection/*.dtbo
          else
            LARGE_DTBO=$(find . -name dtbo.img -type f | xargs ls -l | sort -nk 5 | tail -1 | awk '{print $NF}')
            cp -f "$LARGE_DTBO" AnyKernel3/dtbo.img
          fi

          find . -name "*.ko" -type f -not -path "./AnyKernel3/*" -exec cp {} ko_collection/ \;
          mkdir -p AnyKernel3/modules/lib/modules/
          cp -af ko_collection/. AnyKernel3/modules/lib/modules/

          IMAGE=$(find . -name Image -type f -path "*/dist/*" | head -1)
          [ -z "$IMAGE" ] && IMAGE=$(find . -name Image -type f | head -1)

          if [ -z "$IMAGE" ]; then
            echo "❌ 找不到内核镜像"
            exit 1
          fi

          cp -f "$IMAGE" AnyKernel3/Image
          cd AnyKernel3
          zip -r9 ../S25u-SukiSU-Kernel.zip ./*
          cd ..
          mv *.zip output/

      - uses: actions/upload-artifact@v4
        with:
          name: S25u-Custom-Kernel
          path: output/


name: 纯净环境测试编译
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout  仓库代码
        uses: actions/checkout@v4

      - name: 安装必备依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix

      - name: 暴力赋权
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      - name: 执行内核编译 (纯净版)
        run: |
          cd $GITHUB_WORKSPACE
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 提取产物并打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3

          echo "🔍 寻找 Image"
          IMAGE_PATH=$(find . -name "Image" -type f | grep -v AK3 | head -n 1)
          if [ -n "$IMAGE_PATH" ]; then
            cp -f "$IMAGE_PATH" AK3/
          fi

          echo "🔍 寻找 dtbo.img"
          DTBO_PATH=$(find . -name "dtbo.img" -type f | grep -v AK3 | head -n 1)
          if [ -n "$DTBO_PATH" ]; then
            cp -f "$DTBO_PATH" AK3/
          fi

          echo "🔍 寻找所有 .ko 模块"
          mkdir -p AK3/modules
          find . -name "*.ko" -type f | grep -v AK3 | xargs -r cp -t AK3/modules/

          cd AK3
          zip -r "../S25_Test_Kernel.zip" . -x ".git/*"

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: S25_Test_Kernel
          path: S25_Test_Kernel.zip


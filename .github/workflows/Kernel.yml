name: S25_GKI_Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Fix line endings
        run: find . -name "*.sh" -exec dos2unix {} + || true

      - name: Setup SukiSU GKI
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: Hack Build System & Inject Config
        run: |
          # 1. 定位文件
          MSM_COMMON=$(find . -name "build.config.msm.common" | head -1)
          SUN_PERF=$(find . -name "sun_perf.config" | head -1)
          
          echo "Files: $MSM_COMMON, $SUN_PERF"

          # 2. 解除 exit 1 校验
          sed -i 's/exit 1/# exit 1/g' "$MSM_COMMON"
          
          # 3. 预处理现有配置（防止重复）
          KEYS="CONFIG_KSU CONFIG_KPROBES CONFIG_KPROBE_EVENTS CONFIG_OVERLAY_FS CONFIG_KNOX_NCM CONFIG_UH CONFIG_RKP CONFIG_KDP CONFIG_SECURITY_DEFEX CONFIG_FIVE CONFIG_SEC_RESTRICT_SETUID CONFIG_SEC_RESTRICT_FORK CONFIG_SEC_RESTRICT_ROOT_ACCESS CONFIG_LOCALVERSION"
          for key in $KEYS; do
            sed -i "s/^$key=/# $key=/g" "$SUN_PERF" || true
            sed -i "s/^# $key=/# $key=/g" "$SUN_PERF" || true
          done

          # 4. 逐行注入自定义配置，规避 YAML 语法风险
          echo "" >> "$SUN_PERF"
          echo "# --- Custom SukiSU & Security Bypass ---" >> "$SUN_PERF"
          echo "CONFIG_KSU=y" >> "$SUN_PERF"
          echo "CONFIG_KPROBES=y" >> "$SUN_PERF"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$SUN_PERF"
          echo "CONFIG_OVERLAY_FS=y" >> "$SUN_PERF"
          echo "CONFIG_KNOX_NCM=n" >> "$SUN_PERF"
          echo "CONFIG_UH=n" >> "$SUN_PERF"
          echo "CONFIG_RKP=n" >> "$SUN_PERF"
          echo "CONFIG_KDP=n" >> "$SUN_PERF"
          echo "CONFIG_SECURITY_DEFEX=n" >> "$SUN_PERF"
          echo "CONFIG_FIVE=n" >> "$SUN_PERF"
          echo "CONFIG_SEC_RESTRICT_SETUID=n" >> "$SUN_PERF"
          echo "CONFIG_SEC_RESTRICT_FORK=n" >> "$SUN_PERF"
          echo "CONFIG_SEC_RESTRICT_ROOT_ACCESS=n" >> "$SUN_PERF"
          echo 'CONFIG_LOCALVERSION="-S25-GKI-SukiSU"' >> "$SUN_PERF"

      - name: Build kernel
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          export SKIP_CONFIG_CHECK=1
          export SKIP_ABI_CHECK=1
          export GKI_KMI_ENFORCED=0
          # 执行编译
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: Pack with AnyKernel3
        run: |
          mkdir -p output
          if [ ! -d AnyKernel3 ]; then
            git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          fi

          # 全局捞 Image
          IMAGE=$(find kernel_platform/bazel-out -name "Image" -type f | head -1)
          [ -z "$IMAGE" ] && IMAGE=$(find kernel_platform/bazel-out -name "Image.gz" -type f | head -1)
          
          if [ -n "$IMAGE" ]; then
            cp "$IMAGE" AnyKernel3/
            # 全局捞 dtbo
            find kernel_platform/bazel-out -name "dtbo.img" -type f -exec cp {} AnyKernel3/ \;
            # 全局捞所有模块
            mkdir -p AnyKernel3/modules/lib/modules/
            find kernel_platform/bazel-out -name "*.ko" -type f -exec cp {} AnyKernel3/modules/lib/modules/ \;
            
            cd AnyKernel3 && zip -r9 ../S25-GKI-SukiSU.zip ./* && cd ..
            mv S25-GKI-SukiSU.zip output/
            find kernel_platform/bazel-out -name ".config" -type f -exec cp {} output/final_config_bak \; 2>/dev/null || true
          else
            echo "Build failed, Image not found." && exit 1
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25_Kernel_SukiSU
          path: output/

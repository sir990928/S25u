name: 三星S25u_内核编译_SukiSU版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache Bazel build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            out/
          key: ${{ runner.os }}-bazel-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: 环境依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 注入 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 替换成你的 S25.config
        run: |
          FILE="kernel_platform/build/kernel/android/prepare_vendor.sh"
          sed -i 's!^.*build/brunch.*$!# &!' "$FILE"
          sed -i '/#.*build\/brunch/a \  mkdir -p "${ROOT_DIR}/../out/msm-sun-sun-perf"' "$FILE"
          sed -i '/#.*build\/brunch/a \  cp -f "${ROOT_DIR}/S25.config" "${ROOT_DIR}/../out/msm-sun-sun-perf/.config"' "$FILE"

      - name: 开始编译
        run: |
          export CL_SYNC="SukiSU"
          export BUILD_NUMBER="Ultra"
          export SEC_BUILD_OPTION_KNOX_CSB="n"
          export SEC_PRODUCT_SHIP="n"
          export SKIP_DEFCONFIG_VALIDATION=1
          chmod +x build_kernel_GKI.sh
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3
        run: |
          mkdir -p output
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3

          IMAGE=$(find . -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$IMAGE" ]; then
            cp -v "$IMAGE" AnyKernel3/
            find . -name "dtbo.img" -type f 2>/dev/null -exec cp {} AnyKernel3/ \;
            mkdir -p AnyKernel3/modules/lib/modules/
            find . -name "*.ko" -type f 2>/dev/null -exec cp {} AnyKernel3/modules/lib/modules/ \;
            cd AnyKernel3
            zip -r9 ../S25u-Custom-Kernel.zip ./*
            cd ..
            mv S25u-Custom-Kernel.zip output/
          fi

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: S25u-Custom-Kernel
          path: output/


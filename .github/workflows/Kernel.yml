name: S25_Ultra_内核编译_极致禁用Knox完整版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix aria2 bazel-bootstrap

      # 1. 下载源码包
      - name: 下载源码安装包
        run: |
          aria2c -x 16 -s 16 -k 1M -o kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      # 2. 合并解压
      - name: 根目录自动解压
        run: |
          unzip -o -q kernel_platform.zip -d .
          rm -f kernel_platform.zip

      # ========== 唯一修改区：彻底修复配置，适配三星Bazel原生链路 ==========
      - name: 前置静态修改内核配置（彻底解决127/def重复报错）
        run: |
          set -e
          # 1. 处理 common GKI 核心 defconfig
          GKI_DEF="kernel_platform/common/arch/arm64/configs/gki_defconfig"
          # 先彻底清理所有冲突配置，避免重复
          sed -i '/CONFIG_.*KNOX/d;/CONFIG_.*RKP/d;/CONFIG_.*KDP/d' "$GKI_DEF"
          sed -i '/CONFIG_MODULE_SIG/d;/CONFIG_LOCKDOWN/d;/CONFIG_SEC_/d' "$GKI_DEF"
          sed -i '/CONFIG_DEBUG_/d;/CONFIG_KASAN/d;/CONFIG_UBSAN/d;/CONFIG_GCOV/d;/CONFIG_KPROBES/d' "$GKI_DEF"
          sed -i '/CONFIG_LOCALVERSION/d;/CONFIG_KPM/d;/CONFIG_UH/d;/CONFIG_SECURITY_DEFEX/d;/CONFIG_INTEGRITY/d;/CONFIG_FIVE/d;/CONFIG_KNOX_NCM/d' "$GKI_DEF"
          sed -i '/CONFIG_LOCALVERSION_AUTO/d;/CONFIG_DEFAULT_SECURITY_DAC/d;/CONFIG_DEFAULT_SELINUX/d;/CONFIG_TRIM_UNUSED_KSYMS/d' "$GKI_DEF"
          
          # 追加标准关闭配置（用>>避免覆盖GKI基础配置，只追加我们的定制项）
          cat >> "$GKI_DEF" << 'EOF'
CONFIG_LOCALVERSION="-S25-DisableKnox"
CONFIG_KPM=y
CONFIG_UH=n
CONFIG_RKP=n
CONFIG_KDP=n
CONFIG_SECURITY_DEFEX=n
CONFIG_INTEGRITY=n
CONFIG_FIVE=n
CONFIG_KNOX_NCM=n
CONFIG_LOCALVERSION_AUTO=n
CONFIG_DEFAULT_SECURITY_DAC=n
CONFIG_DEFAULT_SELINUX=n
CONFIG_TRIM_UNUSED_KSYMS=n
CONFIG_DEBUG_INFO=n
CONFIG_DEBUG_INFO_BTF=n
CONFIG_DEBUG_INFO_REDUCED=n
CONFIG_DEBUG_FS=n
CONFIG_GCOV=n
CONFIG_KASAN=n
CONFIG_UBSAN=n
CONFIG_KPROBES=n
CONFIG_MODULE_SIG=n
CONFIG_MODULE_SIG_FORCE=n
CONFIG_LOCKDOWN_NONE=y
EOF

          # 2. 处理 msm-kernel 厂商 defconfig
          MSM_DEF_DIR="kernel_platform/msm-kernel/arch/arm64/configs"
          # 遍历所有gki defconfig，统一处理
          for def in "$MSM_DEF_DIR"/*_gki_defconfig; do
            [ -f "$def" ] || continue
            # 清理三星Knox相关配置
            sed -i '/CONFIG_SEC_KNOX/d;/CONFIG_SEC_RKP/d;/CONFIG_QCOM_SECURE_BOOT/d' "$def"
            # 追加关闭项
            cat >> "$def" << 'EOF'
CONFIG_SEC_KNOX=n
CONFIG_SEC_RKP=n
CONFIG_SEC_KNOX_SUPPORT=n
CONFIG_SEC_HARDENING=n
CONFIG_SEC_BOOT_SECURITY=n
CONFIG_SEC_ANTIROLLBACK=n
CONFIG_SEC_VBMETA_CHECK=n
CONFIG_KNOX_MDM=n
CONFIG_QCOM_SECURE_BOOT=n
EOF
          done

          # 3. 拦截三星动态注入Knox的脚本（终极防回写）
          find kernel_platform -name "*.py" -o -name "*.sh" | xargs sed -i '/SEC_KNOX\|SEC_RKP\|knox_enable/s/^/#/' 2>/dev/null || true
      # ====================================================================

      # 3. 注入 SukiSU（完全保留你原逻辑）
      - name: 在线注入 SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin

      # 4. 终极兜底：源码Kbuild注释安全驱动编译（完全保留你原逻辑）
      - name: 源码级拦截Knox/RKP编译节点
        run: |
          find kernel_platform/msm-kernel/drivers/samsung -name Kbuild -type f \
          -exec sed -i 's/^obj-y.*knox/#obj-y/g; s/^obj-y.*rkp/#obj-y/g; s/^obj-y.*kdp/#obj-y/g; s/^obj-y.*security/#obj-y/g' {} \;

      # 5. 深度清理缓存防止配置残留覆盖（完全保留你原逻辑）
      - name: 清理旧编译缓存&残留配置
        run: |
          bazel clean --expunge 2>/dev/null || true
          rm -rf kernel_platform/common/out kernel_platform/msm-kernel/out
          rm -rf out/ build.log
          find kernel_platform -name ".config" -delete

      # 权限修复（完全保留你原逻辑）
      - name: 全局赋权+脚本换行修复
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      # 执行三星原版GKI编译脚本（完全保留你原逻辑）
      - name: 执行内核编译
        run: |
          cd $GITHUB_WORKSPACE
          export SKIP_DEFCONFIG_VALIDATION=true
          export SKIP_GIT_CLEAN=1
          export BAZEL_USE_SANDBOX=0
          export KLEAF_ALLOW_UNSAFE_SYMLINKS=1
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # 打包AnyKernel3（完全保留你原逻辑）
      - name: 提取产物打包内核刷入包
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          IMAGE_PATH=$(find . -name "Image" -not -path "./AK3/*" -type f | head -n 1)
          DTBO_PATH=$(find . -name "dtbo.img" -not -path "./AK3/*" -type f | head -n 1)
          if [ -n "$IMAGE_PATH" ]; then
            cp -f "$IMAGE_PATH" AK3/
            [ -n "$DTBO_PATH" ] && cp -f "$DTBO_PATH" AK3/dtbo.img
            mkdir -p AK3/modules
            find . -name "*.ko" -not -path "./AK3/*" -exec cp {} AK3/modules/ \;
            cd AK3 && zip -r "../S25_Ultra_SukiSU_NoKnox_$(date +%m%d%H%M).zip" . -x ".git/*"
          else
            echo "❌ 未找到内核Image，请检查编译日志"
            exit 1
          fi

      # 上传成品（完全保留你原逻辑）
      - name: 上传编译内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_Ultra_SukiSU_去Knox内核
          path: S25_Ultra_SukiSU_NoKnox_*.zip

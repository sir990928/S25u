name: S25Ultra-GKI内核编译
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 集成KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 替换GKI配置为S25U
        run: |
          cp -fv kernel_platform/S25.config kernel_platform/common/arch/arm64/configs/gki_defconfig

      - name: 开始编译
        run: |
          chmod +x build_kernel_GKI.sh
          ./build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包内核
        run: |
          mkdir -p output
          git clone --depth=1 https://github.com/topjohnwu/AnyKernel3.git
          find kernel_platform/out -name Image | head -1 | xargs -I {} cp {} AnyKernel3/
          find kernel_platform/out -name *.dtbo | head -1 | xargs -I {} cp {} AnyKernel3/
          find kernel_platform/out -name *.ko -exec cp {} AnyKernel3/modules/lib/modules/ \;
          cd AnyKernel3
          zip -r9 ../S25Ultra_GKI内核.zip ./*
          cd ..
          mv *.zip output/

      - name: 上传内核包
        uses: actions/upload-artifact@v4
        with:
          name: S25Ultra-GKI-Kernel
          path: output/


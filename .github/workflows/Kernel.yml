name: "S25U-SukiSU-Integrated-Build"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境与哨兵点火
        run: |
          sudo apt update && sudo apt install -y zip cpio python3
          # 1. 递归赋予所有脚本执行权限
          find . -name "*.sh" -exec chmod +x {} +
          
          # 2. 启动你自建的监控脚本（后台运行，盯防 .config）
          ./kernel_platform/build/kernel/build.config.sh &
          echo "✅ 哨兵已在后台启动..."

      - name: 🏗️ 执行内核编译
        run: |
          # 运行主编译脚本
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 🛠️ 合成 DTBO 并集成 AnyKernel3
        if: success()
        run: |
          # 1. 创建去重工作区
          mkdir -p dtbo_work
          echo "🔍 正在从 out/ 和 devices/ 搜集并去重 .dtbo..."
          
          # 使用 MD5 校验文件内容去重
          declare -A seen_hashes
          find out devices -name "*.dtbo" -type f 2>/dev/null | while read -r dtbo_file; do
              hash=$(md5sum "$dtbo_file" | awk '{print $1}')
              if [[ -z "${seen_hashes[$hash]}" ]]; then
                  seen_hashes[$hash]=1
                  # 使用 Hash 重命名防止文件名冲突
                  cp "$dtbo_file" "dtbo_work/${hash}.dtbo"
                  echo "  + 提取唯一 DTBO: $(basename "$dtbo_file")"
              fi
          done

          # 2. 使用指定工具合成 dtbo.img
          MKDTBOIMG="./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg"
          if [ -f "$MKDTBOIMG" ]; then
              chmod +x "$MKDTBOIMG"
              "$MKDTBOIMG" create dtbo.img dtbo_work/*.dtbo
              echo "✅ dtbo.img 合成成功！"
          else
              echo "❌ 错误：找不到指定工具 $MKDTBOIMG"
              exit 1
          fi

          # 3. 克隆 AnyKernel3 (fei-ke 仓库 s25 分支)
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25
          
          # 4. 【关键步骤】将 Image 和 dtbo.img 放入同一个 AK3 目录
          echo "📦 正在将产物集成进 AnyKernel3..."
          # 搜索 Image 并拷贝
          find kernel_platform/bazel-cache -name "Image" -type f | head -n 1 | xargs -I {} cp {} AnyKernel3/
          # 拷贝合成的 dtbo.img
          [ -f "dtbo.img" ] && cp dtbo.img AnyKernel3/
          
          # 5. 制作最终刷机包
          cd AnyKernel3
          zip -r9 ../S25U-SukiSU-Kernel-Flashable.zip ./*
          cd ..

      - name: 📂 连根拔起打包原始目录 (out & devices)
        if: always()
        run: |
          mkdir -p raw_folders
          # 完整拷贝根目录下的两个文件夹
          echo "📂 正在搬运根目录原始目录..."
          [ -d "out" ] && cp -r out raw_folders/
          [ -d "devices" ] && cp -r devices raw_folders/
          
          # 存一份镜像副本方便直接查看
          find . -name "Image" -type f | head -n 1 | xargs -I {} cp {} raw_folders/
          [ -f "dtbo.img" ] && cp dtbo.img raw_folders/

      - name: 📤 上传 - 刷机包 (Image+dtbo.img)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Flashable-Kernel-ZIP
          path: S25U-SukiSU-Kernel-Flashable.zip

      - name: 📤 上传 - 原始目录全家桶 (out & devices)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Raw-Artifacts
          path: raw_folders/


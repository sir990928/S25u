name: "S25U-SukiSU-Integrated-Build"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境与哨兵点火
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 inotify-tools
          
          # 1. 赋予脚本执行权限
          find . -name "*.sh" -type f -exec chmod +x {} + || true
          
          # 2. 启动精准劫持哨兵 (build.config.sh)
          # 使用 sudo 确保权限，stdbuf 确保日志实时，nice 确保优先级
          chmod +x kernel_platform/build/kernel/build.config.sh || true
          
          sudo stdbuf -oL nice -n -20 ./kernel_platform/build/kernel/build.config.sh > hijack.log 2>&1 &
          HIJACK_PID=$!
          disown
          
          # 3. 开启后台日志监控，确保控制台能看见实时输出
          tail -f hijack.log &
          TAIL_PID=$!
          
          echo "✅ 劫持引擎已点火 [PID: $HIJACK_PID]"
          echo "TAIL_PID=$TAIL_PID" >> $GITHUB_ENV

      - name: 🏗️ 执行内核编译
        run: |
          # 运行主编译脚本
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 🛠️ 合成 DTBO 并集成 AnyKernel3
        if: success()
        run: |
          # 停止日志监控
          [ ! -z "$TAIL_PID" ] && kill $TAIL_PID || true
          
          mkdir -p dtbo_work
          echo "🔍 正在去重并提取 .dtbo..."
          
          declare -A seen_hashes
          find out devices -name "*.dtbo" -type f 2>/dev/null | while read -r dtbo_file; do
              hash=$(md5sum "$dtbo_file" | awk '{print $1}')
              if [[ -z "${seen_hashes[$hash]}" ]]; then
                  seen_hashes[$hash]=1
                  cp "$dtbo_file" "dtbo_work/${hash}.dtbo"
                  echo "  + 提取唯一 DTBO: $(basename "$dtbo_file")"
              fi
          done

          MKDTBOIMG="./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg"
          if [ -f "$MKDTBOIMG" ]; then
              chmod +x "$MKDTBOIMG"
              "$MKDTBOIMG" create dtbo.img dtbo_work/*.dtbo
              echo "✅ dtbo.img 合成成功！"
          else
              echo "❌ 错误：找不到 mkdtboimg 工具"
              exit 1
          fi

          # 克隆 AnyKernel3 (s25 分支)
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25
          
          echo "📦 正在集成产物..."
          # 寻找编译出的 Image
          find kernel_platform/bazel-cache -name "Image" -type f | head -n 1 | xargs -I {} cp {} AnyKernel3/
          [ -f "dtbo.img" ] && cp dtbo.img AnyKernel3/
          
          cd AnyKernel3
          zip -r9 ../S25U-SukiSU-Kernel-Flashable.zip ./*
          cd ..

      - name: 📂 收集原始产物 (out & devices)
        if: always()
        run: |
          mkdir -p raw_folders
          [ -d "out" ] && cp -r out raw_folders/
          [ -d "devices" ] && cp -r devices raw_folders/
          find . -name "Image" -type f | head -n 1 | xargs -I {} cp {} raw_folders/
          [ -f "dtbo.img" ] && cp dtbo.img raw_folders/
          # 把劫持日志也带上，方便排错
          [ -f "hijack.log" ] && cp hijack.log raw_folders/

      - name: 📤 上传 - 刷机包
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Flashable-Kernel-ZIP
          path: S25U-SukiSU-Kernel-Flashable.zip

      - name: 📤 上传 - 原始目录与日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25U-Raw-Artifacts
          path: raw_folders/


name: S25_Ultra_Kernel_SukiSU_Fixed
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix

      # 1. 下载源码包
      - name: 下载源码安装包
        run: |
          wget -O kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip
          unzip -o -q kernel_platform.zip -d .
          sudo rm -f kernel_platform.zip

      # 2. 权限修复
      - name: 暴力赋权 & 修复换行符
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      # 3. 注入 SukiSU (使用官方一键命令，并修复 Git 环境报错)
      - name: 注入 SukiSU
        run: |
          # 进入内核驱动所在的核心目录 (三星 S25 通常在 kernel_platform/common)
          cd kernel_platform/common
          
          # 关键：初始化一个临时的 Git 仓库，防止 setup.sh 报 pathspec 错误
          git init
          git config user.email "build@example.com"
          git config user.name "Builder"
          git add . && git commit -m "initial commit" || true
          
          # 运行官方注入命令 (使用 builtin 模式)
          curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin
          
          # 注入完成后，清理掉临时的 .git 目录，防止干扰后续 Bazel 编译
          rm -rf .git
          echo "✅ SukiSU 注入完成"

      # 4. 修改内核配置 (禁用三星安全项并开启 KSU)
      - name: 修改内核配置
        run: |
          # 修改基础 defconfig
          CONFIG_PATH="kernel_platform/common/arch/arm64/configs/gki_defconfig"
          ./kernel_platform/common/scripts/config --file "$CONFIG_PATH" \
            -e KSU \
            --set-str LOCALVERSION "-S25-Custom" \
            -d RKP -d KDP -d KNOX_NCM -d SECURITY_DEFEX -d INTEGRITY -d FIVE
          
          # 同时修改 build.config 以防止 Bazel 重置配置 (S25 编译的关键)
          CONF_FILE="kernel_platform/build.config.msm.sun"
          if [ -f "$CONF_FILE" ]; then
            echo "PRE_DEFCONFIG_CMDS=\"\${SRCTREE}/scripts/config --file \${OUT_DIR}/arch/arm64/configs/\${DEFCONFIG} -e KSU --set-str LOCALVERSION '-S25-Custom' -d RKP -d KDP -d KNOX_NCM\"" >> "$CONF_FILE"
            echo "✅ build.config 已注入"
          fi

      # 5. 执行内核编译
      - name: 执行内核编译
        run: |
          # 确保在根目录执行，并设置跳过 Git 检查的环境变量
          export SKIP_GIT_CHECK=1
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # 6. 准备 AK3 并打捞产物
      - name: 提取产物并打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          
          echo "🔍 正在全域寻找编译生成的 Image..."
          # 明确排除 AK3 目录，搜索生成的 Image
          IMAGE_PATH=$(find out/ -name "Image" -type f | head -n 1)
          
          if [ -n "$IMAGE_PATH" ]; then
            echo "✅ 发现 Image: $IMAGE_PATH"
            cp -f "$IMAGE_PATH" AK3/
            
            # 同时提取驱动模块 (.ko 文件)
            mkdir -p AK3/modules
            find out/ -name "*.ko" -type f -exec cp {} AK3/modules/ \;
            
            cd AK3 && zip -r "../S25_Final_Kernel_$(date +%Y%m%d).zip" . -x ".git/*"
          else
            echo "❌ 全域未找到 Image，编译可能未成功完成"
            exit 1
          fi

      # 7. 上传最终成品
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: S25_Final_Kernel
          path: S25_Final_Kernel_*.zip

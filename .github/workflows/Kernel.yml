name: S25_Ultra_内核编译_极致禁用Knox完整版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # 固定通用源码 common 目录
      COMMON_SRC: $GITHUB_WORKSPACE/kernel_platform/common
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix aria2 gcc-aarch64-linux-gnu

      - name: 下载内核源码包
        run: aria2c -x 16 -s 16 -k 1M -o kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      - name: 解压清理压缩包
        run: |
          unzip -o -q kernel_platform.zip -d .
          rm -f kernel_platform.zip

      - name: Git路径修复 + 清理无效软链接
        run: |
          git config --global core.preferSymlinks false
          find ./ -type l -name "*.h" -delete 2>/dev/null || true
          rm -rf .git/modules/* 2>/dev/null || true

      # ========== 1、通用common目录修改内核配置 ==========
      - name: 通用源码common目录 修改关闭Knox配置
        run: |
          cd $COMMON_SRC
          pwd
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- mrproper
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          ./scripts/config --set-str LOCALVERSION "-S25-DisableKnox"
          ./scripts/config --enable KPM
          ./scripts/config --disable UH
          ./scripts/config --disable RKP
          ./scripts/config --disable KDP
          ./scripts/config --disable SECURITY_DEFEX
          ./scripts/config --disable INTEGRITY
          ./scripts/config --disable FIVE
          ./scripts/config --disable KNOX_NCM
          ./scripts/config --disable LOCALVERSION_AUTO
          ./scripts/config --disable DEFAULT_SECURITY_DAC
          ./scripts/config --disable DEFAULT_SELINUX
          ./scripts/config --disable DEBUG_INFO
          ./scripts/config --disable DEBUG_INFO_BTF
          ./scripts/config --disable DEBUG_INFO_REDUCED
          ./scripts/config --disable DEBUG_FS
          ./scripts/config --disable GCOV
          ./scripts/config --disable KASAN
          ./scripts/config --disable UBSAN
          ./scripts/config --disable KPROBES
          ./scripts/config --disable MODULE_SIG
          ./scripts/config --disable MODULE_SIG_FORCE
          ./scripts/config --enable LOCKDOWN_NONE
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- savedefconfig
          cp defconfig arch/arm64/configs/gki_defconfig

      # ========== 2、同一个common通用源码目录注入SU ==========
      - name: 同common通用源码 注入SukiSU-Ultra
        run: |
          cd $COMMON_SRC
          pwd
          curl -Lsf https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash

      - name: 源码屏蔽Knox/RKP驱动
        run: |
          find kernel_platform/msm-kernel/drivers/samsung -name Kbuild -exec sed -i '/knox\|rkp/s/^obj-y/#obj-y/' {} +

      - name: Bazel深度清理缓存
        run: |
          cd $GITHUB_WORKSPACE/kernel_platform
          bazel clean --expunge
          rm -rf out/ bazel-*/ 2>/dev/null || true

      - name: 全局权限修复
        run: sudo chmod -R 777 $GITHUB_WORKSPACE

      - name: 启动Bazel内核编译
        run: |
          export SKIP_DEFCONFIG_VALIDATION=true
          export SKIP_GIT_CLEAN=1
          export BAZEL_USE_SANDBOX=0
          cd $GITHUB_WORKSPACE/kernel_platform
          bash build_kernel_GKI.sh pa3q_hnnfc user sun --sandbox_debug

      - name: 打包AnyKernel刷机包
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK
          IMG=$(find $GITHUB_WORKSPACE/kernel_platform/out -name Image -type f | head -n1)
          if [ -f "$IMG" ];then
            cp "$IMG" AK/
            cd AK && zip -r ../S25_Ultra_NoKnox_SukiSU.zip . -x .git/*
          else
            echo "ERROR: 未找到内核Image镜像"
            exit 1
          fi

      - name: 上传成品内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_Ultra_SukiSU_去Knox内核
          path: S25_Ultra_NoKnox_SukiSU.zip


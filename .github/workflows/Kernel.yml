name: "S25Ultra-GKI内核定点劫持编译"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装劫持工具
        run: |
          sudo apt update
          sudo apt install -y inotify-tools dos2unix

      - name: 准备劫持引擎
        run: |
          # 确保根目录有你的完美版 S25.config
          [ -f "S25.config" ] && dos2unix S25.config || (echo "❌ 错误: 找不到 S25.config" && exit 1)
          
          cat > hijack_engine.sh <<'EOF'
          #!/bin/bash
          SOURCE_CONFIG="S25.config"
          # 只有这个哈希段是变动的，其他路径全部写死
          TARGET_PATTERN="/execroot/_main/bazel-out/k8-fastbuild/bin/common/kernel_aarch64_config/out_dir/.config"
          
          echo "🕵️ [$(date +%T)] 劫持器已启动，目标锁定：$TARGET_PATTERN"
          
          # 监控整个目录树，-m 持续模式
          inotifywait -m -r -e close_write --format '%w%f' kernel_platform | while read NEW_FILE
          do
              # 精确校验路径：必须以我们锁定的那长串路径结尾
              if [[ "$NEW_FILE" == *"$TARGET_PATTERN" ]]; then
                  # 执行物理替换
                  cp -f "$SOURCE_CONFIG" "$NEW_FILE"
                  
                  echo "🔥 [$(date +%T)] 目标捕获成功，已执行物理替换！"
                  echo "📍 拦截路径: $NEW_FILE"
                  
                  # 打印关键项确认注入结果
                  grep "CONFIG_LOCALVERSION=" "$NEW_FILE" || echo "⚠️ 警告: 写入失败"
              fi
          done
          EOF
          chmod +x hijack_engine.sh

      - name: 集成 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 执行劫持并启动编译
        run: |
          # 1. 后台启动劫持进程
          ./hijack_engine.sh &
          HIJACK_PID=$!
          
          # 2. 正式开始编译
          chmod +x build_kernel_GKI.sh
          export SKIP_DEFCONFIG_MATCH=1
          export SKIP_IF_SAVEDEFCONFIG_DOES_NOT_MATCH=1
          
          ./build_kernel_GKI.sh pa3q_chn_openx user sun
          
          # 3. 结束后清理
          kill $HIJACK_PID || true

      - name: 打包与上传
        run: |
          mkdir -p output
          git clone --depth=1 https://github.com/topjohnwu/AnyKernel3.git
          find kernel_platform/out -name Image -exec cp {} AnyKernel3/ \;
          find kernel_platform/out -name "*.dtbo" -exec cp {} AnyKernel3/ \;
          mkdir -p AnyKernel3/modules/lib/modules/
          find kernel_platform/out -name "*.ko" -exec cp {} AnyKernel3/modules/lib/modules/ \;
          cd AnyKernel3
          zip -r9 ../S25Ultra_SukiSU_Kernel.zip ./*
          cd ..
          mv S25Ultra_SukiSU_Kernel.zip output/

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25Ultra-SukiSU-Kernel
          path: output/S25Ultra_SukiSU_Kernel.zip


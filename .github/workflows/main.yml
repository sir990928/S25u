name: 纯净环境测试编译
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix

      # 1. 下载源码包
      - name: 下载源码安装包
        run: |
          wget -O kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      # 2. 合并解压
      - name: 根目录自动合并解压
        run: |
          unzip -o -q kernel_platform.zip -d .
          sudo rm -f kernel_platform.zip

      # 3. 暴力赋权 (不加 git init，看看原汁原味报错)
      - name: 暴力赋权
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      # 4. 跳过 SU 注入和 Defconfig 修改，直接启动编译
      - name: 执行内核编译 (纯净版)
        run: |
          cd $GITHUB_WORKSPACE
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # 5. 准备 AK3 并尝试打捞
      - name: 提取产物并打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          
          echo "🔍 正在寻找 Image..."
          # 即使脚本报错，我们也去 bazel-bin 看看有没有遗留的 Image
          IMAGE_PATH=$(find . -name "Image" -not -path "./AK3/*" -type f | head -n 1)
          
          if [ -n "$IMAGE_PATH" ]; then
            echo "✅ 发现 Image: $IMAGE_PATH"
            cp -f "$IMAGE_PATH" AK3/
            cd AK3 && zip -r "../S25_Test_Kernel.zip" . -x ".git/*"
          else
            echo "❌ 全域未找到 Image"
            exit 1
          fi

      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: S25_Test_Kernel
          path: S25_Test_Kernel.zip

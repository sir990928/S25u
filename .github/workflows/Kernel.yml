name: S25_Ultra_内核编译_纯净无脏树终版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4
        with:
          clean: true  # 强制检出洁净工作区

      - name: 安装编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix aria2 gcc-aarch64-linux-gnu

      - name: 下载内核源码包
        run: aria2c -x 16 -s 16 -k 1M -o kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      - name: 解压清理压缩包
        run: |
          rm -rf kernel_platform/  # 先删旧目录防残留
          unzip -o -q kernel_platform.zip -d .
          rm -f kernel_platform.zip

      - name: 前置校验目录&脚本
        run: |
          ls -la
          [ -d "./kernel_platform/common" ] || exit 1
          [ -f "./build_kernel_GKI.sh" ] || exit 1

      # ========== 关键新增：全局深度洁净 根治脏树 ==========
      - name: 内核源码彻底净化 mrproper
        run: |
          cd kernel_platform/common
          make mrproper || true
          cd ../msm-kernel
          make mrproper || true
          cd ..
          # Bazel暴力清缓存
          bazel clean --expunge
          rm -rf bazel-*/ out/ fastbuild-*/
          # 清理残留配置/生成文件
          find . -name ".config" -o -name "auto.conf*" -delete 2>/dev/null || true

      - name: Git路径修复+清理无效软链接
        run: |
          git config --global core.preferSymlinks false
          find ./kernel_platform -type l -delete 2>/dev/null || true

      # 关闭Knox配置
      - name: common目录修改内核配置
        run: |
          cd ./kernel_platform/common
          ./scripts/config --set-str LOCALVERSION "-S25-DisableKnox"
          ./scripts/config --disable KNOX_NCM --disable RKP --disable KDP
          ./scripts/config --disable SECURITY_DEFEX --disable DEFAULT_SECURITY_DAC
          ./scripts/config --disable DEFAULT_SELINUX --disable DEBUG_INFO
          ./scripts/config --disable DEBUG_FS --disable KASAN --disable UBSAN
          ./scripts/config --disable KPROBES --disable MODULE_SIG --disable MODULE_SIG_FORCE
          ./scripts/config --enable KPM --enable LOCKDOWN_NONE

      # 注入SukiSU
      - name: common目录注入SukiSU-Ultra
        run: |
          cd ./kernel_platform/common
          curl -Lsf https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash

      # 屏蔽Knox驱动
      - name: 屏蔽Knox/RKP驱动
        run: |
          find ./kernel_platform/msm-kernel/drivers/samsung -name Kbuild \
          -exec sed -i '/knox\|rkp/s/^obj-y/#obj-y/' {} + 2>/dev/null || true

      - name: 全局权限修复
        run: sudo chmod -R 777 .

      # ========== 移除SKIP_GIT_CLEAN污染变量 ==========
      - name: 根目录启动编译脚本
        run: |
          export SKIP_DEFCONFIG_VALIDATION=true
          export BAZEL_USE_SANDBOX=0
          # 删掉 export SKIP_GIT_CLEAN=1 不再跳过清理
          chmod +x ./build_kernel_GKI.sh
          ./build_kernel_GKI.sh pa3q_hnnfc user sun --sandbox_debug --verbose_failures

      - name: 打包AnyKernel
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK
          IMG=$(find ./kernel_platform/out -name Image -type f | head -n1)
          if [ -f "$IMG" ];then
            cp "$IMG" AK/
            cd AK && zip -r ../S25_Ultra_NoKnox_SukiSU.zip . -x .git/*
          else
            exit 1
          fi

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: S25_Ultra_SukiSU_去Knox内核
          path: S25_Ultra_NoKnox_SukiSU.zip


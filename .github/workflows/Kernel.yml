name: "S25U-SukiSU-Ultra-6.6-No-Patch-Clean"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 检出代码
        uses: actions/checkout@v4

      - name: ⚙️ 准备环境
        run: |
          sudo apt update && sudo apt install -y zip cpio python3 inotify-tools
          chmod +x kernel_platform/build/kernel/build.config.sh || true
          touch hijack.log && chmod 666 hijack.log

      - name: 🧬 注入 SukiSU-Ultra 并物理搬运 SUSFS 核心文件
        run: |
          cd kernel_platform/common
          
          # 1. 注入 SukiSU-Ultra (生成 drivers/kernelsu 结构)
          echo "🛠️ 运行 SukiSU-Ultra 自动化脚本..."
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          
          # 2. 实时获取 SUSFS 核心源码文件
          echo "📥 克隆 SUSFS 官方仓库以获取核心组件..."
          git clone --depth=1 -b gki-android15-6.6-dev https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs
          
          # 3. 物理搬运：将 SUSFS 的“心脏”安装进内核
          echo "📦 搬运物理文件至 fs 和 include 目录..."
          cp /tmp/susfs/kernel_patches/fs/susfs.c ./fs/
          cp /tmp/susfs/kernel_patches/include/linux/susfs.h ./include/linux/
          cp /tmp/susfs/kernel_patches/include/linux/susfs_def.h ./include/linux/
          
          # 4. 头文件关联：让 KSU 能够识别 SUSFS 函数接口
          if [ -f "drivers/kernelsu/ksu.c" ]; then
              sed -i '1i #include <linux/susfs.h>' drivers/kernelsu/ksu.c
              echo "✅ 已手动将 susfs.h 关联至 ksu.c"
          fi

          # 5. 编译目标注册：强制内核编译系统处理 susfs.c
          if ! grep -q "susfs.o" fs/Makefile; then
              echo "obj-y += susfs.o" >> fs/Makefile
              echo "✅ 已在 fs/Makefile 注册编译目标"
          fi

          # 6. 移除 ABI 保护 (GKI 编译必备步骤)
          echo "🚫 移除 ABI 保护文件..."
          rm -f android/abi_gki_protected_exports_*
          
          echo "✅ 注入流程已全部对齐。请确保你的脚本已将 CONFIG_KSU_SUSFS 设置为 y。"

      - name: 🏗️ 执行内核编译 (实时监控)
        run: |
          # 启动后台监控引擎
          (
            LAST_SIZE=0
            while true; do
              if [ -f "hijack.log" ]; then
                CURRENT_SIZE=$(stat -c%s "hijack.log")
                if [ "$CURRENT_SIZE" -gt "$LAST_SIZE" ]; then
                  tail -c +"$((LAST_SIZE + 1))" "hijack.log"
                  LAST_SIZE=$CURRENT_SIZE
                fi
              fi
              sleep 5
            done
          ) &
          MONITOR_PID=$!
          
          # 执行编译并同步日志
          export LOCALVERSION=""
          # 注意：请确保你的脚本或 build.config 会开启 CONFIG_KSU_SUSFS=y
          stdbuf -oL -eL ./build_kernel_GKI.sh pa3q_chn_openx user sun 2>&1 | tee hijack.log
          
          kill $MONITOR_PID || true

      - name: 🛠️ 提取并打包产物 (DTBO + AnyKernel3)
        if: success()
        run: |
          mkdir -p dtbo_work
          # 搜索生成的 dtbo
          find out drivers -name "*.dtbo" -type f 2>/dev/null | while read -r file; do
              fname=$(basename "$file")
              if [ ! -f "dtbo_work/$fname" ]; then 
                  cp "$file" "dtbo_work/$fname"
              fi
          done

          # 创建 dtbo.img
          if [ -n "$(ls -A dtbo_work 2>/dev/null)" ]; then
              ./kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg create dtbo.img dtbo_work/*.dtbo || true
          fi
          
          # 寻找 Image
          GLOBAL_IMAGE=$(find out -name "Image" | grep "sun_perf" | head -n 1)
          [ -z "$GLOBAL_IMAGE" ] && GLOBAL_IMAGE=$(find . -name "Image" -type f | grep -v "AnyKernel" | head -n 1)
          
          # 打包卡刷包
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 ak3_pack
          [ -n "$GLOBAL_IMAGE" ] && cp "$GLOBAL_IMAGE" ak3_pack/
          [ -f "dtbo.img" ] && cp dtbo.img ak3_pack/
          cd ak3_pack && zip -r9 ../S25U-SukiSU-SUSFS-Flashable.zip ./*
          cd ..

      - name: 📦 归档中间产物
        if: always()
        run: |
          mkdir -p final_artifacts
          [ -d "out" ] && zip -r9 final_artifacts/out_full_archive.zip out/ || echo "out missing"
          [ -d "drivers" ] && zip -r9 final_artifacts/drivers_full_archive.zip drivers/ || echo "drivers missing"
          cp S25U-SukiSU-SUSFS-Flashable.zip final_artifacts/ 2>/dev/null || true
          cp hijack.log final_artifacts/ 2>/dev/null || true

      - name: 📤 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: S25U-SukiSU-Ultra-SUSFS-Artifacts
          path: final_artifacts/


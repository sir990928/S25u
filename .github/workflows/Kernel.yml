name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装环境依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 环境预处理
        run: |
          find . -name "*.sh" -type f -exec dos2unix {} + || true

      - name: 配置 SukiSU
        run: |
          cd kernel_platform/common
          if [ -f "setup.sh" ]; then
            bash setup.sh builtin
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          fi

      - name: 注入禁用与启用配置（无重复版）
        run: |
          FILE="kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_perf.config"
          
          # 先删掉旧的，避免重复
          sed -i '/CONFIG_LOCALVERSION="-S25/d' $FILE
          sed -i '/CONFIG_KPM/d' $FILE
          sed -i '/CONFIG_KNOX_NCM/d' $FILE
          sed -i '/CONFIG_UH/d' $FILE
          sed -i '/CONFIG_RKP/d' $FILE
          sed -i '/CONFIG_KDP/d' $FILE
          sed -i '/CONFIG_SECURITY_DEFEX/d' $FILE
          sed -i '/CONFIG_INTEGRITY/d' $FILE
          sed -i '/CONFIG_FIVE/d' $FILE
          sed -i '/CONFIG_TRIM_UNUSED_KSYMS/d' $FILE

          # 统一追加
          cat <<EOF >> $FILE

# Custom Config
CONFIG_LOCALVERSION="-S25-SukiSU-KPM"
CONFIG_KPM=y
CONFIG_KNOX_NCM=n
CONFIG_UH=n
CONFIG_RKP=n
CONFIG_KDP=n
CONFIG_SECURITY_DEFEX=n
CONFIG_INTEGRITY=n
CONFIG_FIVE=n
CONFIG_TRIM_UNUSED_KSYMS=n
EOF

      - name: 执行内核编译（在根目录执行，路径完全正确）
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=true
          # 就在根目录直接执行，不进任何文件夹
          bash build_kernel_GKI.sh pa3q_chn_openx user sun --nocheck_defconfig || true

      - name: 提取 .config 和镜像
        if: always()
        run: |
          mkdir -p output
          find kernel_platform/bazel-out -name ".config" -exec cp {} output/ \;
          find kernel_platform/out -name "Image" -o -name "Image.lz4" -exec cp {} output/ \;

      - name: 打包
        if: always()
        run: |
          zip -r S25_output.zip output/

      - name: 上传产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S25_Build_Result
          path: S25_output.zip


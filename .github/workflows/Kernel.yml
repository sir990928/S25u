name: 三星S25u_内核编译_SukiSU最终版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 环境依赖准备
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 注入 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 编译并强行替换配置 (偷梁换柱)
        run: |
          # 核心环境变量：屏蔽校验与警告，防止 Bazel 自杀
          export ALLOW_WERROR=0
          export SKIP_DEFCONFIG_VALIDATION=1
          export DTC_FLAGS="-Wno-graph_endpoint -Wno-unit_address_vs_reg"
          
          # 暴力抹除源码中的所有 Werror 限制
          find kernel_platform -name "Makefile" -o -name "*.bazel" -o -name "*.bzl" | xargs sed -i 's/-Werror//g' || true

          chmod +x build_kernel_GKI.sh

          # 1. 后台启动主编译脚本
          # 使用 pa3q_chn_openx 针对国行 S25u
          bash build_kernel_GKI.sh pa3q_chn_openx user sun &
          BUILD_PID=$!

          # 2. 动态捕获真身 .config 并强制覆盖
          echo "正在监控深层 .config 生成状态..."
          while true; do
            REAL_CONFIG=$(find kernel_platform/bazel-out -name ".config" | grep "kernel_aarch64_config/out_dir/.config" | head -1)
            
            if [ -n "$REAL_CONFIG" ] && [ -f "$REAL_CONFIG" ]; then
              echo "✅ 捕获到 Bazel 最终配置路径: $REAL_CONFIG"
              echo "🚀 正在注入你的完整 S25.config..."
              cp -f kernel_platform/S25.config "$REAL_CONFIG"
              echo "注入成功，配置已锁定！"
              break
            fi

            # 如果进程挂了（自杀），立即报错
            if ! kill -0 $BUILD_PID 2>/dev/null; then
              echo "❌ 编译进程已提前退出，请检查上方是否有设备树报错。"
              exit 1
            fi
            sleep 5
          done

          # 3. 等待内核 Image 编译圆满完成
          wait $BUILD_PID

      - name: 根目录全路径搜刮与暴力合成打包
        run: |
          mkdir -p output
          # 准备 AK3 模板
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          
          # 创建根目录视角下的临时汇总仓
          mkdir -p dtbo_collection
          mkdir -p ko_collection

          # A.【搜刮所有 .dtbo】
          # 逻辑：从根目录扫荡，找回消失的 15MB 硬件信息
          echo "全路径搜刮设备树碎片..."
          find . -name "*.dtbo" -type f -not -path "./AnyKernel3/*" -exec cp -f {} dtbo_collection/ \;

          # B.【暴力重包 20MB 完全体 DTBO】
          # 使用指定的 mkdtboimg 工具
          MKDTBOIMG="kernel_platform/prebuilts/kernel-build-tools/linux-x86/bin/mkdtboimg"
          if [ -f "$MKDTBOIMG" ]; then
            echo "开始合体合成..."
            $MKDTBOIMG create AnyKernel3/dtbo.img dtbo_collection/*.dtbo
            echo "合体成功，体积：$(du -h AnyKernel3/dtbo.img)"
          else
            echo "警告：未找到工具，抓取体积最大的成品镜像..."
            find . -name "dtbo.img" -type f -not -path "./AnyKernel3/*" -exec ls -l {} + | sort -nk 5 | tail -1 | awk '{print $NF}' | xargs -I{} cp -f {} AnyKernel3/dtbo.img
          fi

          # C.【搜刮所有 .ko 驱动】
          # 逻辑：全路径汇总，确保驱动版本与你的 config 100% 对齐
          echo "全路径搜刮驱动模块..."
          find . -name "*.ko" -type f -not -path "./AnyKernel3/*" -exec cp -f {} ko_collection/ \;
          mkdir -p AnyKernel3/modules/lib/modules/
          cp -af ko_collection/. AnyKernel3/modules/lib/modules/

          # D.【搜刮内核 Image】
          # 优先从 dist 目录找，找不到再全量搜
          IMAGE=$(find . -name "Image" -type f -path "*/dist/*" | head -1)
          [ -z "$IMAGE" ] && IMAGE=$(find . -name "Image" -type f | head -1)

          if [ -n "$IMAGE" ]; then
            echo "发现内核镜像: $IMAGE"
            cp -f "$IMAGE" AnyKernel3/Image
            # 封装上传
            cd AnyKernel3
            zip -r9 ../S25u-SukiSU-Kernel-V1.zip ./*
            cd ..
            mv S25u-SukiSU-Kernel-V1.zip output/
            echo "🎉 打包圆满成功！"
          else
            echo "❌ 致命错误：未找到内核 Image 产物！"
            exit 1
          fi

      - name: 上传最终产物
        uses: actions/upload-artifact@v4
        with:
          name: S25u-Custom-Kernel-Final
          path: output/


name: "S25Ultra-GKI提取原生config"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖工具
        run: |
          sudo apt update
          sudo apt install -y inotify-tools dos2unix

      - name: 集成 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 启动编译并等待config生成
        run: |
          chmod +x build_kernel_GKI.sh
          
          # 后台跑编译，让它走到生成.config阶段
          yes "" | ./build_kernel_GKI.sh pa3q_chn_openx user sun &
          BUILD_PID=$!

          echo "⏳ 等待 Bazel 生成 .config 文件..."
          sleep 180  # 根据你之前速度，留3分钟足够生成config

          # ========== 关键：提取两个原生 .config ==========
          mkdir -p extracted_configs

          find kernel_platform/bazel-cache -path "*msm-kernel/sun_perf_config/out_dir/.config" -type f | head -1 \
            | xargs -I {} cp -v {} extracted_configs/sun_perf_dot_config

          find kernel_platform/bazel-cache -path "*common/kernel_aarch64_config/out_dir/.config" -type f | head -1 \
            | xargs -I {} cp -v {} extracted_configs/kernel_aarch64_dot_config

          ls -la extracted_configs/

          # ========== 杀掉编译进程，不再继续往下编 ==========
          kill $BUILD_PID || true
          echo "🛑 已停止编译，只保留原生 .config"

      - name: 打包提取的config
        run: |
          mkdir -p output
          zip -r9 output/Extracted-Native-Configs.zip extracted_configs/*

      - name: 上传原生config文件
        uses: actions/upload-artifact@v4
        with:
          name: Extracted-Native-Configs
          path: output/Extracted-Native-Configs.zip


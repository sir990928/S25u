name: 三星S25u_内核编译_SukiSU版

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 环境依赖初始化
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 注入 KernelSU 源码
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 物理劫持 Python 构建引擎 (精准补丁版)
        run: |
          PY_SCRIPT=$(find . -name "build_with_bazel.py" | head -1)
          
          cat << 'EOF' > patcher.py
import sys

def patch():
    with open(sys.argv[1], 'r') as f:
        content = f.read()

    # 1. 劫持 write_sec_env_sh_foramt (注入禁用项)
    # 在 f.close() 之前强制写入我们的配置
    old_sh_write = "f.close()"
    new_sh_write = """
        extra_configs = [
            "CONFIG_UH=n", "CONFIG_RKP=n", "CONFIG_KDP=n", "CONFIG_GAF=n",
            "CONFIG_PROCA=n", "CONFIG_SECURITY_DEFEX=n", "CONFIG_INTEGRITY=n",
            "CONFIG_FIVE=n", "CONFIG_TRIM_UNUSED_KSYMS=n", "CONFIG_KNOX_NCM=n",
            "CONFIG_LOCALVERSION_AUTO=n", "CONFIG_KPM=y", "CONFIG_WERROR=n",
            'CONFIG_LOCALVERSION="-SukiSU-Ultra"'
        ]
        for cfg in extra_configs:
            f.write(cfg + "\\n")
        f.close()
"""
    # 注意：这里需要精准匹配函数内的 close
    content = content.replace("self.write_sec_env_sh_foramt(os.path.join(self.workspace, \"msm-kernel\", \"build.config.sec_env\"))", 
                             "pass # Logic moved") # 我们改用直接修改函数体的方式

    # 2. 修改 localversion 生成逻辑
    content = content.replace('localversion = "-{}-abogki{}".format(cl_sync, build_number)', 
                             'localversion = "-SukiSU-Ultra"')

    # 3. 彻底屏蔽最后阶段的 git checkout (防止语法错误，直接清空 cmdline)
    content = content.replace('subprocess.Popen(["git", "checkout"', 'subprocess.Popen(["echo", "Skip Checkout"')

    with open(sys.argv[1], 'w') as f:
        f.write(content)

if __name__ == "__main__":
    patch()
EOF
          python3 patcher.py "$PY_SCRIPT"
          echo "✅ Python 引擎手术完成"

      - name: 开始 Bazel 构建
        run: |
          # 设置基础变量以通过脚本初期校验
          export CL_SYNC="SukiSU"
          export BUILD_NUMBER="Ultra"
          
          chmod +x build_kernel_GKI.sh
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3 刷机包
        run: |
          mkdir -p output
          [ ! -d AnyKernel3 ] && git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git -b s25 AnyKernel3
          IMAGE=$(find . -name "Image" -type f 2>/dev/null | head -1)
          if [ -n "$IMAGE" ]; then
            cp -v "$IMAGE" AnyKernel3/
            find . -name "dtbo.img" -type f 2>/dev/null -exec cp {} AnyKernel3/ \;
            cd AnyKernel3 && zip -r9 ../S25u-Custom-Kernel.zip ./* && cd ..
            mv S25u-Custom-Kernel.zip output/
          else
            echo "错误：未找到 Image 文件"
            exit 1
          fi

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: S25u-Feng-Kernel
          path: output/


name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 安装 SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      - name: 【一次性写入配置】编译前改好
        run: |
          FILE=kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_perf.config

          # 先清理旧的，避免重复
          sed -i '/CONFIG_KPM/d' $FILE
          sed -i '/CONFIG_LOCALVERSION.*S25/d' $FILE
          sed -i '/CONFIG_KNOX_NCM/d' $FILE
          sed -i '/CONFIG_UH/d' $FILE
          sed -i '/CONFIG_RKP/d' $FILE
          sed -i '/CONFIG_KDP/d' $FILE
          sed -i '/CONFIG_SECURITY_DEFEX/d' $FILE
          sed -i '/CONFIG_INTEGRITY/d' $FILE
          sed -i '/CONFIG_FIVE/d' $FILE
          sed -i '/CONFIG_TRIM_UNUSED_KSYMS/d' $FILE

          # 统一写入新配置（只写一次）
          echo "" >> $FILE
          echo "# Custom Config" >> $FILE
          echo "CONFIG_LOCALVERSION=\"-S25-SukiSU-KPM\"" >> $FILE
          echo "CONFIG_KPM=y" >> $FILE
          echo "CONFIG_KNOX_NCM=n" >> $FILE
          echo "CONFIG_UH=n" >> $FILE
          echo "CONFIG_RKP=n" >> $FILE
          echo "CONFIG_KDP=n" >> $FILE
          echo "CONFIG_SECURITY_DEFEX=n" >> $FILE
          echo "CONFIG_INTEGRITY=n" >> $FILE
          echo "CONFIG_FIVE=n" >> $FILE
          echo "CONFIG_TRIM_UNUSED_KSYMS=n" >> $FILE

      - name: 开始编译
        run: |
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=1
          cd kernel_platform
          python3 tools/bazel clean --expunge
          bash ../build_kernel_GKI.sh pa3q_chn_openx user sun --nocheck_defconfig

      - name: 打包输出
        if: always()
        run: |
          mkdir output
          find kernel_platform/out -name "Image*" -exec cp {} output/ \;
          find kernel_platform/bazel-out -name ".config" -exec cp {} output/ \;
          zip -r S25_Output.zip output/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: S25_Build
          path: S25_Output.zip


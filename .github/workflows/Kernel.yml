name: "S25Ultra-GKI内核编译"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole dwarves

      - name: 集成 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 自定义内核配置 (碎片化合并方案)
        run: |
          cd kernel_platform
          
          # 创建一个自定义配置碎片文件
          cat > common/arch/arm64/configs/s25u_extra.config <<'EOF'
          CONFIG_UH=n
          CONFIG_KNOX_NCM=n
          CONFIG_RKP=n
          CONFIG_KDP=n
          CONFIG_LOCALVERSION_AUTO=n
          CONFIG_LOCALVERSION="-SukiSU-Ultra"
          CONFIG_KPM=y
          # CONFIG_FIVE is not set
          # CONFIG_PROCA is not set
          # CONFIG_GAF is not set
          # CONFIG_TRIM_UNUSED_KSYMS is not set
          # CONFIG_INTEGRITY is not set
          # CONFIG_SECURITY_DEFEX is not set
          EOF

          # 关键操作：将碎片内容追加到 gki_defconfig，但不直接改原文件内容
          # 而是使用内核自带的脚本进行一次预合并，确保格式对齐
          ARCH=arm64 scripts/kconfig/merge_config.sh -m common/arch/arm64/configs/gki_defconfig common/arch/arm64/configs/s25u_extra.config
          
          # 将合并后生成的 .config 重新写回为 gki_defconfig，并更新 savedefconfig
          cp -f .config common/arch/arm64/configs/gki_defconfig
          cp -f .config common/arch/arm64/configs/savedefconfig

      - name: 开始编译
        run: |
          chmod +x build_kernel_GKI.sh
          # 使用以下环境变量告知 Kleaf 忽略校验并允许差异
          export SKIP_DEFCONFIG_MATCH=1
          export LTO=thin
          ./build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: 打包 AnyKernel3
        run: |
          mkdir -p output
          git clone --depth=1 https://github.com/topjohnwu/AnyKernel3.git
          
          find kernel_platform/out -name Image -exec cp {} AnyKernel3/ \;
          find kernel_platform/out -name "*.dtbo" -exec cp {} AnyKernel3/ \;
          
          mkdir -p AnyKernel3/modules/lib/modules/
          find kernel_platform/out -name "*.ko" -exec cp {} AnyKernel3/modules/lib/modules/ \;
          
          cd AnyKernel3
          zip -r9 ../S25Ultra_GKI_Kernel.zip ./*
          cd ..
          mv S25Ultra_GKI_Kernel.zip output/

      - name: 上传内核包
        uses: actions/upload-artifact@v4
        with:
          name: S25Ultra-GKI-Kernel
          path: output/S25Ultra_GKI_Kernel.zip

      - name: 自动清理历史失败记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          WORKFLOW_FILE="Kernel.yml"
          TARGET_IDS=$(gh run list --workflow "$WORKFLOW_FILE" --json databaseId,status \
            --jq '.[] | select(.status=="failure" or .status=="cancelled") | .databaseId')
          
          for run_id in $TARGET_IDS; do
            if [ "$run_id" != "$CURRENT_RUN_ID" ]; then
              gh run delete "$run_id"
            fi
          done
        continue-on-error: true


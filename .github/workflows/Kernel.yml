name: "S25Ultra-GKI内核深度路径劫持"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装劫持工具
        run: |
          sudo apt update
          sudo apt install -y inotify-tools dos2unix

      - name: 准备劫持引擎 (循环覆盖版)
        run: |
          SOURCE_PATH="kernel_platform/S25.config"
          if [ ! -f "$SOURCE_PATH" ]; then
            echo "❌ 错误: 找不到 $SOURCE_PATH" && exit 1
          fi
          dos2unix "$SOURCE_PATH"

          mkdir -p kernel_platform/bazel-cache

          cat > hijack_engine.sh <<'EOF'
          #!/bin/bash
          SOURCE_CONFIG="kernel_platform/S25.config"

          TARGET_PATTERN="kernel_platform/bazel-cache/*/execroot/_main/bazel-out/k8-fastbuild/bin/common/kernel_aarch64_config/out_dir/.config"

          echo "🕵️ [$(date +%T)] 劫持引擎启动，持续监控路径: $TARGET_PATTERN"

          while true; do
            FOUND=$(find kernel_platform/bazel-cache -type f -name ".config" 2>/dev/null | grep -E "(execroot|bazel-out)" | grep -E "$(basename "$TARGET_PATTERN")" | head -n 1)

            if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
              cp -f "$SOURCE_CONFIG" "$FOUND"
              echo "✅ [$(date +%T)] 已替换 .config → $FOUND"
              grep -q "CONFIG_LOCALVERSION" "$FOUND" && echo "   验证: $(grep CONFIG_LOCALVERSION "$FOUND" | head -n1)"
            fi

            sleep 0.2
          done &

          inotifywait -m -r -e create,close_write,moved_to \
            --exclude "sandbox|sandbox_stash" \
            --format '%w%f' kernel_platform/bazel-cache 2>/dev/null | while read NEW_FILE
          do
            if [[ "$NEW_FILE" == *".config" ]] && [[ "$NEW_FILE" == *"bazel-out"* ]] && [[ "$NEW_FILE" == *"kernel_aarch64_config"* ]]; then
              cp -f "$SOURCE_CONFIG" "$NEW_FILE"
              echo "🔥 [$(date +%T)] 监听触发，已覆盖: $NEW_FILE"
            fi
          done
          EOF
          chmod +x hijack_engine.sh

      - name: 集成 KernelSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s gki

      - name: 执行劫持并启动编译
        run: |
          sudo nice -n -20 ./hijack_engine.sh &
          HIJACK_PID=$!

          chmod +x build_kernel_GKI.sh
          export SKIP_DEFCONFIG_MATCH=1
          export SKIP_IF_SAVEDEFCONFIG_DOES_NOT_MATCH=1

          ./build_kernel_GKI.sh pa3q_chn_openx user sun

          kill $HIJACK_PID || true

      - name: 打包输出
        run: |
          mkdir -p output
          git clone --depth=1 https://github.com/topjohnwu/AnyKernel3.git

          # 只从根目录搜索 Image
          find . -name "Image" -type f | head -n 1 | xargs -I {} cp {} AnyKernel3/

          cd AnyKernel3

          # 从根目录直接打包 out 和 drivers
          cp -r ../out .
          cp -r ../drivers .

          zip -r9 ../S25Ultra_SukiSU_Kernel.zip ./*
          cd ..
          mv S25Ultra_SukiSU_Kernel.zip output/

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25Ultra-SukiSU-Kernel
          path: output/S25Ultra_SukiSU_Kernel.zip

      - name: 清理运行历史
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow "Kernel.yml" --json databaseId,status \
            --jq '.[] | select(.status=="failure" or .status=="cancelled") | .databaseId' | xargs -I {} gh run delete {}
        continue-on-error: true


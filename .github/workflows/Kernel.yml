name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装环境依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: 环境预处理
        run: |
          find . -name "*.sh" -type f -exec dos2unix {} + || true

      - name: 配置 SukiSU
        run: |
          cd kernel_platform/common
          if [ -f "setup.sh" ]; then
            bash setup.sh builtin
          else
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin
          fi

      - name: 定点注入与禁用配置
        run: |
          FILE="kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_perf.config"
          
          # 需要启用的项
          configs_on=(
            "CONFIG_LOCALVERSION=\"-S25-SukiSU-KPM\""
            "CONFIG_KPM=y"
          )

          # 需要禁用的项 (你新增的项已加入)
          configs_off=(
            "CONFIG_KNOX_NCM"
            "CONFIG_UH"
            "CONFIG_RKP"
            "CONFIG_KDP"
            "CONFIG_SECURITY_DEFEX"
            "CONFIG_INTEGRITY"
            "CONFIG_FIVE"
            "CONFIG_TRIM_UNUSED_KSYMS"
          )

          # 处理启用的项
          for cfg in "${configs_on[@]}"; do
            key=$(echo "$cfg" | cut -d'=' -f1)
            sed -i "/$key/d" $FILE || true
            echo "$cfg" >> $FILE
          done

          # 处理禁用的项 (设为 n)
          for key in "${configs_off[@]}"; do
            sed -i "/$key/d" $FILE || true
            echo "$key=n" >> $FILE
          done
          
          echo "✅ 配置注入与禁用处理完成"

      - name: 执行内核编译 (允许校验报错)
        run: |
          cd kernel_platform
          python3 ./tools/bazel clean --expunge || true
          cd ..
          export KCONFIG_WERROR=false
          export SKIP_DEFCONFIG_VALIDATION=true
          # 哪怕校验失败也继续，确保能走到下一步提取 .config
          bash build_kernel_GKI.sh pa3q_chn_openx user sun --kconfig_werror=false --nocheck_defconfig || echo "⚠️ 触发预期内的校验报错，准备打捞目标文件"

      - name: 强力提取 .config 进行验证
        if: always()
        run: |
          # 优先寻找包含你自定义内核名的 .config
          TARGET_PATH=$(find kernel_platform/bazel-out -name ".config" -exec grep -l "CONFIG_LOCALVERSION=\"-S25-SukiSU-KPM\"" {} + | head -n 1)
          
          if [ -n "$TARGET_PATH" ]; then
            cp "$TARGET_PATH" ./final_kernel.config
            echo "✅ 成功捕获配置: $TARGET_PATH"
          else
            echo "❌ 未发现精准配置，捞取任意 sun_perf 相关结果"
            find kernel_platform/bazel-out -name ".config" | grep "sun_perf" | xargs -I {} cp {} ./final_kernel.config || true
          fi

      - name: 产物封装
        if: always()
        run: |
          mkdir -p debug_pkg
          [ -f "./final_kernel.config" ] && cp ./final_kernel.config debug_pkg/
          find kernel_platform/out -name "Image" -exec cp {} debug_pkg/ \; || true
          cd debug_pkg
          zip -r "../S25_Verify_Configs.zip" .

      - name: 上传验证产物
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: S2verify_S25_Configs
          path: S25_Verify_Configs.zip


name: S25_Ultra_内核编译_极致注入版
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix aria2

      # 1. 下载源码包
      - name: 下载源码安装包
        run: |
          aria2c -x 16 -s 16 -k 1M -o kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      # 2. 合并解压
      - name: 根目录自动合并解压
        run: |
          unzip -o -q kernel_platform.zip -d .
          sudo rm -f kernel_platform.zip

      # 3. 注入 SukiSU
      - name: 在线注入 SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash -s builtin

      # 4. 【核心修复】通过 build.config 动态注入配置 (解决 scripts/config 路径问题)
      - name: 修改 build.config 注入参数
        run: |
          echo "⚙️ 正在通过 build.config 钩子注入配置..."
          BC_FILE="kernel_platform/common/build.config.gki"
          
          # 注入环境变量，封住校验报错的嘴
          echo "export SKIP_DEFCONFIG_VALIDATION=true" >> $BC_FILE
          echo "export SKIP_GIT_CLEAN=1" >> $BC_FILE
          
          # 定义钩子函数
          echo "POST_DEFCONFIG_CMDS=\"set_configs\"" >> $BC_FILE
          echo "function set_configs() {" >> $BC_FILE
          echo "  echo '🛠️ 执行动态配置注入...'" >> $BC_FILE
          
          # 使用 ${S_COMMON_OUT_DIR} 绝对路径定位脚本，防止 Exit 127 错误
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config --set-str LOCALVERSION \"-S25\"" >> $BC_FILE
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config -e KPM" >> $BC_FILE
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config -d UH -d RKP -d KDP -d SECURITY_DEFEX -d INTEGRITY -d FIVE -d KNOX_NCM" >> $BC_FILE
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config -d LOCALVERSION_AUTO -d DEFAULT_SECURITY_DAC -d DEFAULT_SELINUX" >> $BC_FILE
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config -d TRIM_UNUSED_KSYMS -d DEBUG_INFO -d DEBUG_INFO_BTF -d DEBUG_INFO_REDUCED" >> $BC_FILE
          echo "  \${S_COMMON_OUT_DIR}/scripts/config --file \${OUT_DIR}/.config -d DEBUG_FS -d GCOV -d KASAN -d UBSAN -d KPROBES" >> $BC_FILE
          
          echo "  echo '🔄 重新同步配置结构...'" >> $BC_FILE
          echo "  make -C \${S_COMMON_OUT_DIR} O=\${OUT_DIR} \${TOOL_ARGS} olddefconfig" >> $BC_FILE
          echo "}" >> $BC_FILE

      # 5. 暴力赋权
      - name: 暴力赋权
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      # 6. 执行内核编译
      - name: 执行内核编译
        run: |
          cd $GITHUB_WORKSPACE
          export SKIP_DEFCONFIG_VALIDATION=true
          export SKIP_GIT_CLEAN=1
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # 7. 提取产物并打包 (Image + DTBO + KO)
      - name: 提取产物并打包
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          
          echo "🔍 正在全域打捞产物..."
          IMAGE_PATH=$(find . -name "Image" -not -path "./AK3/*" -type f | head -n 1)
          DTBO_PATH=$(find . -name "dtbo.img" -not -path "./AK3/*" -type f | head -n 1)
          
          if [ -n "$IMAGE_PATH" ]; then
            cp -f "$IMAGE_PATH" AK3/
            [ -n "$DTBO_PATH" ] && cp -f "$DTBO_PATH" AK3/dtbo.img
            
            echo "📦 收集所有驱动模块 (.ko)..."
            mkdir -p AK3/modules
            find . -name "*.ko" -not -path "./AK3/*" -exec cp {} AK3/modules/ \;
            
            cd AK3 && zip -r "../S25_Kernel_SukiSU_$(date +%m%d%H%M).zip" . -x ".git/*"
          else
            echo "❌ 未找到 Image，请检查编译日志"
            exit 1
          fi

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_SukiSU_Kernel
          path: S25_Kernel_SukiSU_*.zip

name: S25_GKI_Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependencies
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix pahole

      - name: Inject SukiSU
        run: |
          cd kernel_platform/common
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s builtin

      # ==============================================
      # 🔥 只改配置表，没有任何动态注入
      # ==============================================
      - name: Apply config to sun_perf.config
        run: |
          FILE="kernel_platform/msm-kernel/arch/arm64/configs/vendor/sun_perf.config"

          # 先清理旧配置，避免重复
          sed -i '/CONFIG_LOCALVERSION/d' "$FILE"
          sed -i '/CONFIG_KPM/d' "$FILE"
          sed -i '/CONFIG_KNOX/d' "$FILE"
          sed -i '/CONFIG_UH/d' "$FILE"
          sed -i '/CONFIG_RKP/d' "$FILE"
          sed -i '/CONFIG_KDP/d' "$FILE"
          sed -i '/CONFIG_SECURITY_SELINUX/d' "$FILE"
          sed -i '/CONFIG_DM_VERITY/d' "$FILE"
          sed -i '/CONFIG_AVB/d' "$FILE"

          # 写入我们的配置
          echo "" >> "$FILE"
          echo "# Custom Kernel Config" >> "$FILE"
          echo 'CONFIG_LOCALVERSION="-S25-SukiSU-KPM"' >> "$FILE"
          echo "CONFIG_KPM=y" >> "$FILE"
          echo "CONFIG_KNOX_NCM=n" >> "$FILE"
          echo "CONFIG_UH=n" >> "$FILE"
          echo "CONFIG_RKP=n" >> "$FILE"
          echo "CONFIG_KDP=n" >> "$FILE"
          echo "CONFIG_SECURITY_SELINUX=n" >> "$FILE"
          echo "CONFIG_SECURITY_SELINUX_PERMISSIVE=y" >> "$FILE"
          echo "CONFIG_DM_VERITY=n" >> "$FILE"
          echo "CONFIG_AVB=n" >> "$FILE"

      # ==============================================
      # 🔥 关键：关闭三星的配置覆盖检测
      # ==============================================
      - name: Build
        run: |
          cd kernel_platform
          ./tools/bazel clean --expunge || true
          cd ..

          # 允许配置覆盖（必须加，否则三星直接报错）
          export KCONFIG_ALLOW_OVERRIDE=y
          export KCONFIG_WERROR=false

          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      # ==============================================
      # 提取最终 .config 给你核对
      # ==============================================
      - name: Extract final .config
        run: |
          CFG=$(find kernel_platform/bazel-out/ -name ".config" | head -n 1)
          if [ -f "$CFG" ]; then
            cp "$CFG" ./final_kernel.config
          fi

      - name: Package AnyKernel3
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3

          find kernel_platform/out -name "Image" | head -n 1 | xargs -I{} cp {} AK3/
          find kernel_platform/out -name "dtbo.img" | head -n 1 | xargs -I{} cp {} AK3/

          mkdir -p AK3/modules
          find kernel_platform/out -name "*.ko" | xargs -r cp -t AK3/modules/

          cp ./final_kernel.config AK3/ 2>/dev/null || true

          cd AK3
          zip -r ../S25_Build.zip . -x ".git/*"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: S25_Kernel
          path: S25_Build.zip
          sed -i '/CONFIG_AVB/d' "$FILE"

          # 统一写到文件末尾（不会重复）
          echo "" >> "$FILE"
          echo "# Custom S25 Config" >> "$FILE"
          echo 'CONFIG_LOCALVERSION="-S25-SukiSU-KPM"' >> "$FILE"
          echo "CONFIG_KPM=y" >> "$FILE"
          echo "CONFIG_KNOX_NCM=n" >> "$FILE"
          echo "CONFIG_UH=n" >> "$FILE"
          echo "CONFIG_RKP=n" >> "$FILE"
          echo "CONFIG_KDP=n" >> "$FILE"
          echo "CONFIG_SECURITY_SELINUX=n" >> "$FILE"
          echo "CONFIG_SECURITY_SELINUX_PERMISSIVE=y" >> "$FILE"
          echo "CONFIG_DM_VERITY=n" >> "$FILE"
          echo "CONFIG_AVB=n" >> "$FILE"

      - name: Compile
        run: |
          cd kernel_platform
          ./tools/bazel clean --expunge || true
          cd ..

          # 🔥 关键修复：允许配置覆盖，不报错
          export KCONFIG_WERROR=false
          export KCONFIG_ALLOW_UNDEFINED=y
          bash build_kernel_GKI.sh pa3q_chn_openx user sun

      - name: Extract_Config
        run: |
          TARGET_PATH=$(find kernel_platform/bazel-out/ -name ".config" 2>/dev/null | head -n 1)
          if [ -n "$TARGET_PATH" ] && [ -f "$TARGET_PATH" ]; then
            cp "$TARGET_PATH" ./final_kernel.config
          else
            echo "Target config not found"
            exit 1
          fi

      - name: Package
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3

          find kernel_platform/out -name "Image" | head -n 1 | xargs -I{} cp {} AK3/
          find kernel_platform/out -name "dtbo.img" | head -n 1 | xargs -I{} cp {} AK3/

          mkdir -p AK3/modules
          find kernel_platform/out -name "*.ko" | xargs -r cp -t AK3/modules/

          [ -f "./final_kernel.config" ] && cp ./final_kernel.config AK3/

          cd AK3
          zip -r "../S25_Build_Output.zip" . -x ".git/*"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: S25_Kernel_Archive
          path: S25_Build_Output.zip
          printf "CONFIG_RKP=n\n" >> $FILE
          printf "CONFIG_KDP=n\n" >> $FILE
          printf "CONFIG_SECURITY_SELINUX=n\n" >> $FILE
          printf "CONFIG_SECURITY_SELINUX_PERMISSIVE=y\n" >> $FILE
          printf "CONFIG_DM_VERITY=n\n" >> $FILE
          printf "CONFIG_AVB=n\n" >> $FILE

      - name: Compile
        run: |
          cd kernel_platform
          ./tools/bazel clean --expunge || true
          cd ..
          export KCONFIG_WERROR=false
          bash build_kernel_GKI.sh pa3q_chn_openx user sun --kconfig_werror=false

      - name: Extract_Config
        run: |
          # 从你指定的沙盒路径提取 .config
          TARGET_PATH=$(find kernel_platform/bazel-out/k8-fastbuild/bin/common -name ".config" 2>/dev/null | head -n 1)
          if [ -n "$TARGET_PATH" ]; then
            cp "$TARGET_PATH" ./final_kernel.config
          else
            echo "Target config path not found"
            exit 1
          fi

      - name: Package
        run: |
          git clone --depth 1 -b s25 https://github.com/fei-ke/AnyKernel3.git AK3
          find kernel_platform/out -name "Image" -exec cp {} AK3/ \;
          find kernel_platform/out -name "dtbo.img" -exec cp {} AK3/ \;
          mkdir -p AK3/modules
          find kernel_platform/out -name "*.ko" -exec cp {} AK3/modules/ \;
          # 放入提取的 .config 供你核对
          [ -f "./final_kernel.config" ] && cp ./final_kernel.config AK3/
          cd AK3
          zip -r "../S25_Build_Output.zip" . -x ".git/*"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: S25_Kernel_Archive
          path: S25_Build_Output.zip

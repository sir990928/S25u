name: 纯净基底_关Knox_内置SukiSU

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4

      - name: 安装必备依赖
        run: |
          sudo apt update -y
          sudo apt install -y curl wget unzip zip git build-essential libssl-dev bc python3 flex bison libelf-dev lz4 cpio dos2unix

      - name: 下载源码安装包
        run: |
          wget -O kernel_platform.zip https://github.com/sir990928/S25ultra/releases/download/1/kernel_platform.zip

      - name: 解压源码
        run: |
          unzip -o -q kernel_platform.zip -d .
          sudo rm -f kernel_platform.zip

      - name: 赋权
        run: |
          sudo chmod -R 777 $GITHUB_WORKSPACE
          find . -name "*.sh" -exec dos2unix {} + || true

      - name: 深度清理内核树
        run: |
          cd $GITHUB_WORKSPACE/kernel_platform
          rm -rf out/
          find . -name "*.o" -delete
          find . -name "*.cmd" -delete
          make -C common mrproper || true
          make -C msm-kernel mrproper || true

      - name: 关闭 Knox/UH/FIVE 安全配置
        run: |
          cd $GITHUB_WORKSPACE/kernel_platform/common
          ./scripts/config --set-str LOCALVERSION "-S25-Pure-NoKnox-SukiSU"
          ./scripts/config --disable KNOX_NCM
          ./scripts/config --disable RKP
          ./scripts/config --disable KDP
          ./scripts/config --disable UH
          ./scripts/config --disable UH_RKP
          ./scripts/config --disable FIVE
          ./scripts/config --disable INTEGRITY_FIVE
          ./scripts/config --disable SECURITY_DEFEX
          ./scripts/config --disable SEC_RESTRICT_ROOTING
          ./scripts/config --disable DEFAULT_SELINUX
          ./scripts/config --disable MODULE_SIG
          ./scripts/config --disable MODULE_SIG_FORCE

      - name: 注入 SukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel_platform/common
          curl -Lsf https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh | bash

      - name: 物理屏蔽安全驱动 (Knox/UH/FIVE)
        run: |
          cd $GITHUB_WORKSPACE/kernel_platform/msm-kernel/drivers/samsung
          # 修复了 KEYWORDS 的语法，确保循环在 shell 中正确执行
          for key in knox uh rkp five defex; do
            find . -type f \( -name "Kbuild" -o -name "Makefile" \) | \
            xargs sed -i "/$key/s/^obj-/#obj-/" 2>/dev/null || true
          done

      - name: 执行编译
        run: |
          cd $GITHUB_WORKSPACE
          export RECOMPILE_KERNEL=1
          export LTO=thin
          bash build_kernel_GKI.sh pa3q_chn_openx user sun 2>&1 | tee build_full.log

      - name: 查找 Image 并打包
        run: |
          cd $GITHUB_WORKSPACE
          # 克隆 AnyKernel3 并在当前目录操作
          git clone --depth=1 https://github.com/fei-ke/AnyKernel3.git AK3
          # 修正了查找逻辑，确保不会找错目录
          IMAGE_PATH=$(find ./kernel_platform/out -type f -name "Image" 2>/dev/null | head -n 1)
          if [ -z "$IMAGE_PATH" ]; then
            IMAGE_PATH=$(find . -type f -name "Image" ! -path "./AK3/*" | head -n 1)
          fi
          
          if [ -n "$IMAGE_PATH" ]; then
            cp "$IMAGE_PATH" AK3/
            cd AK3
            zip -r ../S25_NoKnox_SukiSU.zip . -x ".git/*"
          else
            echo "未找到编译生成的 Image 文件"
            exit 1
          fi

      - name: 上传内核
        uses: actions/upload-artifact@v4
        with:
          name: S25_NoKnox_SukiSU
          path: "*.zip"

